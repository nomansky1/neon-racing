<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>NEON RACING</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;position:fixed;top:0;left:0;font-family:'Courier New',monospace}
#game-canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%}
#hud{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:rgba(0,0,0,0.75)}
#overlay.hidden{display:none}
#overlay h1{font-size:48px;color:#39ff14;text-shadow:0 0 30px #39ff14,0 0 60px #39ff14;margin-bottom:8px;letter-spacing:4px}
#overlay h2{font-size:16px;color:#8a2be2;margin-bottom:30px;letter-spacing:6px}
.menu-btn{pointer-events:all;background:rgba(138,43,226,0.2);border:2px solid #8a2be2;color:#fff;padding:14px 36px;margin:8px;font-size:18px;font-family:'Courier New',monospace;cursor:pointer;border-radius:8px;min-width:160px;text-align:center;transition:all 0.2s}
.menu-btn:hover,.menu-btn:active,.menu-btn.selected{background:rgba(57,255,20,0.25);border-color:#39ff14;color:#39ff14;box-shadow:0 0 20px rgba(57,255,20,0.3)}
.lap-row{display:flex;gap:10px;margin:16px 0}
#result-box{text-align:center;color:#fff}
#result-box .pos{font-size:60px;font-weight:bold;color:#ffcc00;text-shadow:0 0 20px #ffcc00}
#result-box .detail{font-size:16px;color:rgba(255,255,255,0.6);margin:6px}
/* HUD Controls */
.ctrl-btn{position:fixed;pointer-events:all;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:bold;font-family:'Courier New',monospace;z-index:15;border:2px solid rgba(138,43,226,0.6);background:rgba(20,10,40,0.45);color:rgba(255,255,255,0.8);-webkit-tap-highlight-color:transparent}
.ctrl-btn:active,.ctrl-btn.active{background:rgba(57,255,20,0.3);border-color:#39ff14;color:#39ff14;box-shadow:0 0 15px rgba(57,255,20,0.4)}
#btn-left{display:none!important}
#btn-right{display:none!important}
#joystick-zone{position:fixed;bottom:20px;left:20px;width:130px;height:130px;z-index:15;pointer-events:all;-webkit-tap-highlight-color:transparent}
#joystick-base{position:absolute;top:0;left:0;width:130px;height:130px;border-radius:50%;background:rgba(20,10,40,0.4);border:2px solid rgba(138,43,226,0.5)}
#joystick-thumb{position:absolute;width:56px;height:56px;border-radius:50%;background:rgba(57,255,20,0.3);border:2px solid rgba(57,255,20,0.6);top:37px;left:37px;transition:none;box-shadow:0 0 12px rgba(57,255,20,0.3)}
#btn-gas{bottom:12px;right:12px;width:90px;height:80px;background:rgba(0,100,0,0.4);border-color:rgba(57,255,20,0.6)}
#btn-gas:active,#btn-gas.active{background:rgba(57,255,20,0.4);border-color:#39ff14}
#btn-brake{bottom:12px;right:112px;width:80px;height:80px;background:rgba(100,0,0,0.4);border-color:rgba(255,50,50,0.6)}
#btn-brake:active,#btn-brake.active{background:rgba(255,50,50,0.4);border-color:#ff3232}
#btn-nos{bottom:100px;right:12px;width:70px;height:60px;background:rgba(0,50,100,0.4);border-color:rgba(0,200,255,0.6);font-size:16px}
#btn-nos:active,#btn-nos.active{background:rgba(0,200,255,0.4);border-color:#00c8ff;box-shadow:0 0 20px rgba(0,200,255,0.5)}
#hud-top{position:fixed;top:0;left:0;width:100%;padding:8px 14px;display:flex;justify-content:space-between;align-items:flex-start;z-index:15;pointer-events:none}
.hud-box{background:rgba(5,5,15,0.7);border:1px solid rgba(138,43,226,0.4);border-radius:8px;padding:6px 12px;color:#fff;font-size:13px;line-height:1.5}
#speedo{position:fixed;bottom:100px;right:100px;z-index:15;pointer-events:none;color:#39ff14;font-size:28px;font-weight:bold;text-shadow:0 0 10px #39ff14;text-align:right}
#speedo small{font-size:12px;color:rgba(255,255,255,0.5)}
#nos-bar{position:fixed;bottom:168px;right:14px;width:66px;height:8px;border:1px solid rgba(0,200,255,0.5);border-radius:4px;z-index:15;overflow:hidden;pointer-events:none}
#nos-fill{width:100%;height:100%;background:linear-gradient(90deg,#0066cc,#00ccff);transition:width 0.1s}
#minimap{position:fixed;top:60px;right:10px;width:80px;height:80px;z-index:15;pointer-events:none}
</style>
</head>
<body>

<!-- Overlay Screens -->
<div id="overlay">
    <h1>NEON</h1>
    <h1 style="margin-top:-10px">RACING</h1>
    <h2>CYBER EDITION</h2>
    <div id="menu-main">
        <div style="color:rgba(255,255,255,0.6);margin-bottom:12px;font-size:14px">SELECT LAPS</div>
        <div class="lap-row" id="lap-select"></div>
        <div class="menu-btn" id="btn-start" style="margin-top:20px;font-size:22px">START RACE</div>
    </div>
    <div id="result-box" style="display:none"></div>
</div>

<!-- HUD -->
<div id="hud-top" style="display:none">
    <div class="hud-box" id="hud-pos">POS: -</div>
    <div class="hud-box" id="hud-lap">LAP: -</div>
</div>
<div id="speedo" style="display:none">0<br><small>MPH</small></div>
<div id="nos-bar" style="display:none"><div id="nos-fill"></div></div>
<canvas id="minimap" style="display:none"></canvas>

<!-- Controls -->
<div id="joystick-zone" style="display:none">
    <div id="joystick-base">
        <div id="joystick-thumb"></div>
    </div>
</div>
<div id="btn-left" class="ctrl-btn" style="display:none">&#9664;</div>
<div id="btn-right" class="ctrl-btn" style="display:none">&#9654;</div>
<div id="btn-gas" class="ctrl-btn" style="display:none">GAS</div>
<div id="btn-brake" class="ctrl-btn" style="display:none">BRK</div>
<div id="btn-nos" class="ctrl-btn" style="display:none">NOS</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
'use strict';

// ================================================================
//  CONFIG
// ================================================================
var NUM_AI = 5;
var TRACK_RADIUS = 300;
var TRACK_SEGS = 200;
var ROAD_WIDTH = 24;
var NUM_LANES = 4;
var LANE_W = ROAD_WIDTH / NUM_LANES;
var MAX_NOS = 100;
var NOS_DRAIN = 0.6;
var NOS_REGEN = 0.08;
var NOS_BOOST = 1.6;
var GRAVITY = -30;
var CAR_COLORS = [0x39ff14, 0xff4500, 0x00bfff, 0xff1493, 0xffd700, 0xff6600];
var AI_COLORS = [0xff4500, 0x00bfff, 0xff1493, 0xffd700, 0xff6600];
var CAR_TYPES = ['lambo', 'porsche', 'ferrari', 'gt', 'muscle', 'lambo'];

// ================================================================
//  GLOBALS
// ================================================================
var scene, camera, renderer, clock;
var trackPoints = [], trackLength = 0, trackCurve;
var playerCar, aiCars = [];
var state = 'menu'; // menu, countdown, racing, finished
var selectedLaps = 3;
var totalLaps;
var countdownTimer = 0;
var countdownNum = 3;

// Day/night cycle
var dayNightTime = 0;
var DAY_CYCLE_SPEED = 0.004; // full cycle ~1500s (25 min)
var ambientLight, dirLight, hemiLight;
var skyColors = {
    day:   { sky: 0x6699dd, fog: 0x99bbdd, ambient: 0xaabbcc, dir: 0xfff5e0, hemi: 0x99ccff, ground: 0x556655, exposure: 2.0 },
    dusk:  { sky: 0x553366, fog: 0x442255, ambient: 0x776688, dir: 0xff7744, hemi: 0x664477, ground: 0x332233, exposure: 1.4 },
    night: { sky: 0x050515, fog: 0x050515, ambient: 0x334455, dir: 0x5555aa, hemi: 0x222244, ground: 0x0a0a15, exposure: 1.0 },
    dawn:  { sky: 0x665577, fog: 0x554466, ambient: 0x887799, dir: 0xffbb66, hemi: 0x776688, ground: 0x443344, exposure: 1.5 }
};
var clouds = [];
var sunMesh, moonMesh, starField;

// Controls
var input = { left:false, right:false, gas:false, brake:false, nos:false };

// Audio
var audioCtx = null;
var engineOscA = null, engineOscB = null, engineGain = null;

// Particles
var exhaustParticles = [], tireParticles = [], sparkParticles = [], lightParticles = [];
var particlePool = { exhaust:[], tire:[], spark:[], light:[] };

// Environment
var buildings = [], trees = [];
var terrainZones = []; // different zones along the track

// DOM
var overlay = document.getElementById('overlay');
var menuMain = document.getElementById('menu-main');
var resultBox = document.getElementById('result-box');
var hudTop = document.getElementById('hud-top');
var hudPos = document.getElementById('hud-pos');
var hudLap = document.getElementById('hud-lap');
var speedo = document.getElementById('speedo');
var nosBar = document.getElementById('nos-bar');
var nosFill = document.getElementById('nos-fill');
var minimap = document.getElementById('minimap');
var minimapCtx = minimap.getContext('2d');

// ================================================================
//  INIT THREE.JS
// ================================================================
function initThree() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020010);
    scene.fog = new THREE.FogExp2(0x020010, 0.006);

    camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.5, 600);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.BasicShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.insertBefore(renderer.domElement, document.body.firstChild);
    renderer.domElement.id = 'game-canvas';

    clock = new THREE.Clock();

    // Lights
    ambientLight = new THREE.AmbientLight(0x445566, 1.0);
    scene.add(ambientLight);

    hemiLight = new THREE.HemisphereLight(0x99bbdd, 0x334422, 0.6);
    scene.add(hemiLight);

    dirLight = new THREE.DirectionalLight(0xffeedd, 0.8);
    dirLight.position.set(50, 80, 50);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(512, 512);
    dirLight.shadow.camera.near = 1;
    dirLight.shadow.camera.far = 200;
    dirLight.shadow.camera.left = -60;
    dirLight.shadow.camera.right = 60;
    dirLight.shadow.camera.top = 60;
    dirLight.shadow.camera.bottom = -60;
    scene.add(dirLight);

    // Ground plane
    var groundGeo = new THREE.PlaneGeometry(2000, 2000);
    var groundMat = new THREE.MeshStandardMaterial({ color: 0x223322, roughness: 0.95 });
    var ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.15;
    ground.receiveShadow = true;
    scene.add(ground);
    // store ref for day/night color changes
    ground.userData.isGround = true;

    // Grid helper for neon feel (reduced for mobile perf)
    var grid = new THREE.GridHelper(800, 40, 0x1a0033, 0x0a0015);
    grid.position.y = -0.05;
    scene.add(grid);

    // Clouds
    createClouds();

    // Sun
    sunMesh = new THREE.Mesh(
        new THREE.SphereGeometry(8, 12, 12),
        new THREE.MeshBasicMaterial({ color: 0xffee88 })
    );
    scene.add(sunMesh);

    // Moon
    moonMesh = new THREE.Mesh(
        new THREE.SphereGeometry(5, 12, 12),
        new THREE.MeshBasicMaterial({ color: 0xddeeff })
    );
    scene.add(moonMesh);

    // Stars (particle field)
    var starGeo = new THREE.BufferGeometry();
    var starVerts = [];
    for (var si = 0; si < 400; si++) {
        var theta = Math.random() * Math.PI * 2;
        var phi = Math.random() * Math.PI * 0.5;
        var sr = 350 + Math.random() * 100;
        starVerts.push(
            Math.cos(theta) * Math.sin(phi) * sr,
            Math.cos(phi) * sr + 30,
            Math.sin(theta) * Math.sin(phi) * sr
        );
    }
    starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
    var starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.2, sizeAttenuation: true });
    starField = new THREE.Points(starGeo, starMat);
    starField.visible = false;
    scene.add(starField);

    // Start at dawn
    dayNightTime = 0.75;

    window.addEventListener('resize', function() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
}

// ================================================================
//  CLOUDS
// ================================================================
function createClouds() {
    for (var i = 0; i < 10; i++) {
        var group = new THREE.Group();
        // Each cloud = cluster of spheres
        var numPuffs = 2 + Math.floor(Math.random() * 3);
        var cloudMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.35 });
        for (var p = 0; p < numPuffs; p++) {
            var r = 10 + Math.random() * 15;
            var puffGeo = new THREE.SphereGeometry(r, 5, 4);
            var puff = new THREE.Mesh(puffGeo, cloudMat.clone());
            puff.position.set((Math.random() - 0.5) * 30, (Math.random() - 0.5) * 5, (Math.random() - 0.5) * 15);
            puff.scale.y = 0.4 + Math.random() * 0.3;
            group.add(puff);
        }
        var angle = Math.random() * Math.PI * 2;
        var dist = 100 + Math.random() * 500;
        group.position.set(Math.cos(angle) * dist, 50 + Math.random() * 40, Math.sin(angle) * dist);
        group.userData.driftX = (Math.random() - 0.5) * 2;
        group.userData.driftZ = (Math.random() - 0.5) * 2;
        scene.add(group);
        clouds.push(group);
    }
}

function updateClouds(dt) {
    for (var i = 0; i < clouds.length; i++) {
        var c = clouds[i];
        c.position.x += c.userData.driftX * dt;
        c.position.z += c.userData.driftZ * dt;
        // Wrap around
        if (c.position.x > 600) c.position.x = -600;
        if (c.position.x < -600) c.position.x = 600;
        if (c.position.z > 600) c.position.z = -600;
        if (c.position.z < -600) c.position.z = 600;
    }
}

// ================================================================
//  DAY/NIGHT CYCLE
// ================================================================
function lerpColor(a, b, t) {
    var ca = new THREE.Color(a);
    var cb = new THREE.Color(b);
    return ca.lerp(cb, t);
}

function updateDayNight(dt) {
    dayNightTime = (dayNightTime + DAY_CYCLE_SPEED * dt) % 1;

    // 0-0.25 = day, 0.25-0.5 = dusk, 0.5-0.75 = night, 0.75-1.0 = dawn
    var phase, t;
    var fromKey, toKey;
    if (dayNightTime < 0.25) {
        fromKey = 'day'; toKey = 'day'; t = 0;
    } else if (dayNightTime < 0.35) {
        fromKey = 'day'; toKey = 'dusk'; t = (dayNightTime - 0.25) / 0.1;
    } else if (dayNightTime < 0.5) {
        fromKey = 'dusk'; toKey = 'night'; t = (dayNightTime - 0.35) / 0.15;
    } else if (dayNightTime < 0.75) {
        fromKey = 'night'; toKey = 'night'; t = 0;
    } else if (dayNightTime < 0.85) {
        fromKey = 'night'; toKey = 'dawn'; t = (dayNightTime - 0.75) / 0.1;
    } else {
        fromKey = 'dawn'; toKey = 'day'; t = (dayNightTime - 0.85) / 0.15;
    }

    var from = skyColors[fromKey];
    var to = skyColors[toKey];

    scene.background = lerpColor(from.sky, to.sky, t);
    scene.fog.color = lerpColor(from.fog, to.fog, t);
    ambientLight.color = lerpColor(from.ambient, to.ambient, t);
    dirLight.color = lerpColor(from.dir, to.dir, t);
    hemiLight.color = lerpColor(from.hemi, to.hemi, t);
    hemiLight.groundColor = lerpColor(from.ground, to.ground, t);

    var exposure = from.exposure + (to.exposure - from.exposure) * t;
    renderer.toneMappingExposure = exposure;

    // Sun/Moon position
    var sunAngle = dayNightTime * Math.PI * 2;
    var sunX = Math.cos(sunAngle) * 200;
    var sunY = Math.sin(sunAngle) * 200 + 20;
    var sunZ = 50;
    dirLight.position.set(sunX * 0.4, sunY * 0.4, sunZ);
    dirLight.intensity = 0.2 + Math.max(0, Math.sin(sunAngle)) * 0.8;

    // Shadow follows player for performance
    if (playerCar) {
        dirLight.target.position.copy(playerCar.position);
        dirLight.target.updateMatrixWorld();
    }
    // Only cast shadows during day
    dirLight.castShadow = (sunY > 10);

    // Sun mesh
    if (sunMesh) {
        sunMesh.position.set(sunX, sunY, sunZ);
        sunMesh.visible = (sunY > -10);
        var sunBright = Math.max(0, Math.min(1, sunY / 80));
        sunMesh.material.color.setHex(sunBright > 0.5 ? 0xffee88 : 0xff6622);
        sunMesh.scale.setScalar(0.8 + sunBright * 0.4);
    }

    // Moon mesh (opposite side)
    if (moonMesh) {
        moonMesh.position.set(-sunX * 0.8, -sunY * 0.8 + 60, -sunZ * 0.5);
        moonMesh.visible = (moonMesh.position.y > 5);
    }

    // Stars visible at night
    if (starField) {
        var isNight = (dayNightTime > 0.4 && dayNightTime < 0.9);
        starField.visible = isNight;
        if (isNight) {
            var nightDepth = 1 - Math.abs(dayNightTime - 0.625) / 0.225;
            starField.material.opacity = Math.max(0, nightDepth);
            starField.material.transparent = true;
        }
    }

    // Cloud opacity based on time of day (update only every ~10 frames)
    if (!updateDayNight._fc) updateDayNight._fc = 0;
    updateDayNight._fc++;
    if (updateDayNight._fc % 10 === 0) {
        var cloudOp = dayNightTime < 0.5 ? 0.15 + (0.25 - Math.abs(dayNightTime - 0.25)) * 1.0 : 0.08;
        var cloudColor = lerpColor(from.sky, 0xffffff, 0.7 + t * 0.3);
        for (var i = 0; i < clouds.length; i++) {
            var c = clouds[i];
            for (var ci = 0; ci < c.children.length; ci++) {
                if (c.children[ci].material) {
                    c.children[ci].material.opacity = Math.min(0.45, cloudOp);
                    c.children[ci].material.color.copy(cloudColor);
                }
            }
        }
    }
}

// ================================================================
//  TRACK GENERATION
// ================================================================
function generateTrack() {
    // Create an interesting looping track shape
    trackPoints = [];
    var numCP = 12;
    for (var i = 0; i < numCP; i++) {
        var angle = (i / numCP) * Math.PI * 2;
        var r = TRACK_RADIUS + Math.sin(angle * 3) * 60 + Math.cos(angle * 2) * 40;
        var x = Math.cos(angle) * r;
        var z = Math.sin(angle) * r;
        trackPoints.push(new THREE.Vector3(x, 0, z));
    }

    trackCurve = new THREE.CatmullRomCurve3(trackPoints, true, 'catmullrom', 0.5);
    trackLength = trackCurve.getLength();

    // Build road mesh
    var roadShape = buildRoadMesh();
    scene.add(roadShape);

    // Build barriers and lane markings
    buildBarriers();
    buildLaneMarkings();

    // Terrain zones
    terrainZones = [
        { start: 0, end: 0.25, type: 'city', color: 0x0a0a20 },
        { start: 0.25, end: 0.5, type: 'industrial', color: 0x0a1005 },
        { start: 0.5, end: 0.75, type: 'highway', color: 0x080808 },
        { start: 0.75, end: 1.0, type: 'neon', color: 0x100520 }
    ];

    // Place buildings
    placeBuildings();

    // Place track-side lights
    placeTrackLights();
}

function createRoadTexture() {
    var c = document.createElement('canvas');
    c.width = 512; c.height = 512;
    var ctx = c.getContext('2d');
    // Asphalt base - visible grey
    ctx.fillStyle = '#5a5a65';
    ctx.fillRect(0, 0, 512, 512);
    // Aggregate noise - lots of small dots for realism
    for (var i = 0; i < 8000; i++) {
        var x = Math.random() * 512;
        var y = Math.random() * 512;
        var v = Math.floor(65 + Math.random() * 55);
        ctx.fillStyle = 'rgb(' + v + ',' + v + ',' + (v + 4) + ')';
        ctx.fillRect(x, y, 1 + Math.random() * 3, 1 + Math.random() * 3);
    }
    // Tar patches
    ctx.fillStyle = 'rgba(30,30,35,0.4)';
    for (var p = 0; p < 5; p++) {
        ctx.beginPath();
        ctx.arc(Math.random() * 512, Math.random() * 512, 10 + Math.random() * 30, 0, Math.PI * 2);
        ctx.fill();
    }
    // Cracks
    ctx.strokeStyle = 'rgba(25,25,28,0.3)';
    ctx.lineWidth = 1;
    for (var j = 0; j < 12; j++) {
        ctx.beginPath();
        var cx = Math.random() * 512, cy = Math.random() * 512;
        ctx.moveTo(cx, cy);
        for (var s = 0; s < 4; s++) {
            cx += (Math.random() - 0.5) * 60;
            cy += (Math.random() - 0.5) * 60;
            ctx.lineTo(cx, cy);
        }
        ctx.stroke();
    }
    // Oil stains
    ctx.fillStyle = 'rgba(20,20,25,0.15)';
    for (var o = 0; o < 3; o++) {
        ctx.beginPath();
        ctx.ellipse(Math.random() * 512, Math.random() * 512, 15 + Math.random() * 20, 8 + Math.random() * 12, Math.random() * Math.PI, 0, Math.PI * 2);
        ctx.fill();
    }
    var tex = new THREE.CanvasTexture(c);
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(4, 80);
    tex.needsUpdate = true;
    return tex;
}

function buildRoadMesh() {
    var divisions = 300;
    var geo = new THREE.BufferGeometry();
    var verts = [], uvs = [], indices = [];
    var halfW = ROAD_WIDTH / 2;

    for (var i = 0; i <= divisions; i++) {
        var t = i / divisions;
        var pt = trackCurve.getPointAt(t);
        var tan = trackCurve.getTangentAt(t).normalize();
        var right = new THREE.Vector3(-tan.z, 0, tan.x);

        var l = pt.clone().addScaledVector(right, -halfW);
        var r = pt.clone().addScaledVector(right, halfW);

        verts.push(l.x, 0.05, l.z, r.x, 0.05, r.z);
        uvs.push(0, t * 60, 1, t * 60);

        if (i < divisions) {
            var a = i * 2, b = i * 2 + 1, c = (i + 1) * 2, d = (i + 1) * 2 + 1;
            indices.push(a, c, b, b, c, d);
        }
    }

    geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
    geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
    geo.setIndex(indices);
    geo.computeVertexNormals();

    var roadTex = createRoadTexture();
    var roadMat = new THREE.MeshStandardMaterial({
        map: roadTex,
        color: 0xffffff,
        roughness: 0.82,
        metalness: 0.02
    });

    var mesh = new THREE.Mesh(geo, roadMat);
    mesh.receiveShadow = true;

    // Shoulder strips (white edge lines)
    for (var side = -1; side <= 1; side += 2) {
        var shoulderGeo = new THREE.BufferGeometry();
        var sv = [], si = [];
        var sw = 0.25;
        for (var j = 0; j <= divisions; j++) {
            var st = j / divisions;
            var spt = trackCurve.getPointAt(st);
            var stan = trackCurve.getTangentAt(st).normalize();
            var sright = new THREE.Vector3(-stan.z, 0, stan.x);
            var inner = spt.clone().addScaledVector(sright, side * (halfW - 0.1));
            var outer = spt.clone().addScaledVector(sright, side * (halfW - 0.1 + sw));
            sv.push(inner.x, 0.06, inner.z, outer.x, 0.06, outer.z);
            if (j < divisions) {
                var sa = j * 2, sb = j * 2 + 1, sc = (j+1) * 2, sd = (j+1) * 2 + 1;
                si.push(sa, sc, sb, sb, sc, sd);
            }
        }
        shoulderGeo.setAttribute('position', new THREE.Float32BufferAttribute(sv, 3));
        shoulderGeo.setIndex(si);
        shoulderGeo.computeVertexNormals();
        var shoulderMat = new THREE.MeshBasicMaterial({ color: 0xdddddd });
        var shoulderMesh = new THREE.Mesh(shoulderGeo, shoulderMat);
        mesh.add(shoulderMesh);
    }

    return mesh;
}

function buildBarriers() {
    var divisions = 200;
    var halfW = ROAD_WIDTH / 2 + 0.8;

    for (var side = -1; side <= 1; side += 2) {
        var geo = new THREE.BufferGeometry();
        var verts = [], indices = [];

        for (var i = 0; i <= divisions; i++) {
            var t = i / divisions;
            var pt = trackCurve.getPointAt(t);
            var tan = trackCurve.getTangentAt(t).normalize();
            var right = new THREE.Vector3(-tan.z, 0, tan.x);
            var pos = pt.clone().addScaledVector(right, side * halfW);

            verts.push(pos.x, 0.05, pos.z);
            verts.push(pos.x, 0.65, pos.z);

            if (i < divisions) {
                var a = i * 2, b = i * 2 + 1, c = (i + 1) * 2, d = (i + 1) * 2 + 1;
                if (side > 0) { indices.push(a, b, c, b, d, c); }
                else { indices.push(a, c, b, b, c, d); }
            }
        }

        geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
        geo.setIndex(indices);
        geo.computeVertexNormals();

        var mat = new THREE.MeshStandardMaterial({
            color: 0x8a2be2,
            emissive: 0x3a0b72,
            emissiveIntensity: 0.5,
            roughness: 0.5
        });
        var mesh = new THREE.Mesh(geo, mat);
        scene.add(mesh);
    }
}

function buildLaneMarkings() {
    var divisions = 400;
    var markGeo = new THREE.BufferGeometry();
    var verts = [], indices = [];
    var idx = 0;

    for (var lane = 1; lane < NUM_LANES; lane++) {
        var offset = -ROAD_WIDTH / 2 + lane * LANE_W;
        for (var i = 0; i < divisions; i++) {
            if (i % 4 < 2) continue; // dashed
            var t0 = i / divisions;
            var t1 = (i + 1) / divisions;
            var p0 = trackCurve.getPointAt(t0);
            var p1 = trackCurve.getPointAt(t1);
            var tan0 = trackCurve.getTangentAt(t0).normalize();
            var tan1 = trackCurve.getTangentAt(t1).normalize();
            var r0 = new THREE.Vector3(-tan0.z, 0, tan0.x);
            var r1 = new THREE.Vector3(-tan1.z, 0, tan1.x);
            var hw = 0.08;

            var a0 = p0.clone().addScaledVector(r0, offset - hw);
            var b0 = p0.clone().addScaledVector(r0, offset + hw);
            var a1 = p1.clone().addScaledVector(r1, offset - hw);
            var b1 = p1.clone().addScaledVector(r1, offset + hw);

            verts.push(a0.x, 0.07, a0.z);
            verts.push(b0.x, 0.07, b0.z);
            verts.push(a1.x, 0.07, a1.z);
            verts.push(b1.x, 0.07, b1.z);
            indices.push(idx, idx+2, idx+1, idx+1, idx+2, idx+3);
            idx += 4;
        }
    }

    if (verts.length === 0) return;
    markGeo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
    markGeo.setIndex(indices);

    var markMat = new THREE.MeshBasicMaterial({ color: 0xffcc22 });
    scene.add(new THREE.Mesh(markGeo, markMat));

    // Start/finish line
    var t = 0;
    var pt = trackCurve.getPointAt(t);
    var tan = trackCurve.getTangentAt(t).normalize();
    var right = new THREE.Vector3(-tan.z, 0, tan.x);
    var slGeo = new THREE.PlaneGeometry(ROAD_WIDTH, 2);
    var slMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
    var sl = new THREE.Mesh(slGeo, slMat);
    sl.rotation.x = -Math.PI / 2;
    sl.position.copy(pt);
    sl.position.y = 0.08;
    sl.lookAt(pt.clone().add(tan));
    sl.rotation.x = -Math.PI / 2;
    // Align to road direction
    var angle = Math.atan2(tan.x, tan.z);
    sl.rotation.z = -angle;
    scene.add(sl);
}

function addWindowGrid(bx, by, bz, bw, bh, bd, zone) {
    // Add lit window grids on each visible face
    var wColors = zone === 'neon' ? [0x8a2be2, 0xff00ff, 0x4444ff] :
                  zone === 'city' ? [0xffdd88, 0x88bbff, 0x334455] :
                  [0xffcc66, 0x556688, 0x333344];

    var faces = [
        { axis: 'x', dir: 1, w: bd, h: bh, px: bx + bw * 0.501, py: by, pz: bz, ry: Math.PI / 2 },
        { axis: 'x', dir: -1, w: bd, h: bh, px: bx - bw * 0.501, py: by, pz: bz, ry: -Math.PI / 2 },
        { axis: 'z', dir: 1, w: bw, h: bh, px: bx, py: by, pz: bz + bd * 0.501, ry: 0 },
        { axis: 'z', dir: -1, w: bw, h: bh, px: bx, py: by, pz: bz - bd * 0.501, ry: Math.PI }
    ];

    for (var f = 0; f < faces.length; f++) {
        var face = faces[f];
        var cols = Math.max(1, Math.floor(face.w / 1.2));
        var rows = Math.max(1, Math.floor(face.h / 1.5));
        var winW = face.w * 0.7 / cols;
        var winH = face.h * 0.6 / rows;

        for (var r = 0; r < rows; r++) {
            for (var c = 0; c < cols; c++) {
                if (Math.random() < 0.55) continue; // many windows dark (perf)
                var wGeo = new THREE.PlaneGeometry(winW * 0.7, winH * 0.6);
                var wColor = wColors[Math.floor(Math.random() * wColors.length)];
                var wMat = new THREE.MeshBasicMaterial({
                    color: wColor,
                    transparent: true,
                    opacity: 0.3 + Math.random() * 0.5
                });
                var wMesh = new THREE.Mesh(wGeo, wMat);

                var offX = (c - (cols - 1) / 2) * (face.w * 0.8 / cols);
                var offY = (r - (rows - 1) / 2) * (face.h * 0.7 / rows);

                wMesh.position.set(face.px, face.py + offY, face.pz);
                wMesh.rotation.y = face.ry;

                // Shift along face's local axis
                if (face.axis === 'x') {
                    wMesh.position.z += offX;
                } else {
                    wMesh.position.x += offX;
                }

                scene.add(wMesh);
            }
        }
    }
}

function placeBuildings() {
    var numBuildings = 50;
    var billboardTexts = ['NEON', 'CYBER', 'SPEED', 'TURBO', 'APEX', 'DRIFT', 'NITRO', 'RUSH'];

    for (var i = 0; i < numBuildings; i++) {
        var t = i / numBuildings;
        var pt = trackCurve.getPointAt(t);
        var tan = trackCurve.getTangentAt(t).normalize();
        var right = new THREE.Vector3(-tan.z, 0, tan.x);
        var side = (i % 2 === 0) ? 1 : -1;
        var dist = ROAD_WIDTH / 2 + 5 + Math.random() * 18;

        var zone = getTerrainZone(t);

        // NYC-style varied building heights
        var bw, bh, bd;
        if (zone === 'city' && Math.random() < 0.3) {
            // Skyscraper
            bw = 4 + Math.random() * 5;
            bh = 25 + Math.random() * 35;
            bd = 4 + Math.random() * 5;
        } else {
            bw = 3 + Math.random() * 6;
            bh = 5 + Math.random() * 18;
            bd = 3 + Math.random() * 6;
        }

        var emColor = zone === 'neon' ? 0x8a2be2 : zone === 'city' ? 0x222244 : 0x111122;

        // Building facade texture
        var facadeColor = zone === 'city' ? 0x1a1a2a : 0x0a0a15;
        var mat = new THREE.MeshStandardMaterial({
            color: facadeColor,
            emissive: emColor,
            emissiveIntensity: 0.25,
            roughness: 0.75
        });

        var mesh = new THREE.Mesh(new THREE.BoxGeometry(bw, bh, bd), mat);
        var pos = pt.clone().addScaledVector(right, side * dist);
        mesh.position.set(pos.x, bh / 2, pos.z);
        scene.add(mesh);
        buildings.push(mesh);

        // Window grids
        if (bh > 5) {
            addWindowGrid(pos.x, bh / 2, pos.z, bw, bh, bd, zone);
        }

        // --- NYC Details ---

        // Rooftop water tower (tall buildings)
        if (bh > 15 && Math.random() < 0.4) {
            var towerGeo = new THREE.CylinderGeometry(0.6, 0.6, 1.5, 8);
            var towerMat = new THREE.MeshStandardMaterial({ color: 0x554433, roughness: 0.9 });
            var tower = new THREE.Mesh(towerGeo, towerMat);
            tower.position.set(pos.x + (Math.random() - 0.5) * bw * 0.4, bh + 1.2, pos.z + (Math.random() - 0.5) * bd * 0.4);
            scene.add(tower);
            // Tower legs
            for (var tl = 0; tl < 4; tl++) {
                var leg = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.6, 4),
                    new THREE.MeshStandardMaterial({ color: 0x333333 }));
                var la = (tl / 4) * Math.PI * 2;
                leg.position.set(tower.position.x + Math.cos(la) * 0.4, bh + 0.3, tower.position.z + Math.sin(la) * 0.4);
                scene.add(leg);
            }
        }

        // Rooftop accent / antenna
        if (bh > 20 && Math.random() < 0.5) {
            var antenna = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 3, 4),
                new THREE.MeshStandardMaterial({ color: 0x666666 }));
            antenna.position.set(pos.x, bh + 1.5, pos.z);
            scene.add(antenna);
            // Blinking light on top
            var blink = new THREE.Mesh(new THREE.SphereGeometry(0.1, 4, 4),
                new THREE.MeshBasicMaterial({ color: 0xff0000 }));
            blink.position.set(pos.x, bh + 3, pos.z);
            scene.add(blink);
        }

        // Billboard signs (neon zone)
        if (zone === 'neon' && Math.random() < 0.3 && bh > 8) {
            var signW = 2.5 + Math.random() * 2;
            var signH = 1.2 + Math.random();
            var signCanvas = document.createElement('canvas');
            signCanvas.width = 128; signCanvas.height = 64;
            var sc = signCanvas.getContext('2d');
            var signColors = [0xff00ff, 0x00ffff, 0xff4400, 0x39ff14];
            var signColor = signColors[Math.floor(Math.random() * signColors.length)];
            var sr = (signColor >> 16) & 0xff, sg = (signColor >> 8) & 0xff, sb = signColor & 0xff;
            sc.fillStyle = 'rgba(5,5,15,0.9)';
            sc.fillRect(0, 0, 128, 64);
            sc.fillStyle = 'rgb(' + sr + ',' + sg + ',' + sb + ')';
            sc.font = 'bold 28px sans-serif';
            sc.textAlign = 'center';
            sc.fillText(billboardTexts[Math.floor(Math.random() * billboardTexts.length)], 64, 42);
            var signTex = new THREE.CanvasTexture(signCanvas);
            signTex.needsUpdate = true;
            var signMat = new THREE.MeshBasicMaterial({ map: signTex });
            var signMesh = new THREE.Mesh(new THREE.PlaneGeometry(signW, signH), signMat);
            signMesh.position.set(pos.x, bh * 0.7, pos.z + side * bd * 0.52);
            signMesh.rotation.y = (side > 0) ? 0 : Math.PI;
            scene.add(signMesh);
        }

        // Fire escape (city zone, side of building)
        if (zone === 'city' && Math.random() < 0.25 && bh > 8) {
            var escSide = (Math.random() < 0.5) ? 1 : -1;
            var numFloors = Math.floor(bh / 3);
            for (var fe = 0; fe < Math.min(numFloors, 6); fe++) {
                // Platform
                var platGeo = new THREE.BoxGeometry(1.2, 0.04, 0.5);
                var platMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.5 });
                var plat = new THREE.Mesh(platGeo, platMat);
                plat.position.set(pos.x + escSide * (bw * 0.5 + 0.3), 2 + fe * 3, pos.z);
                scene.add(plat);
                // Railing
                var rail = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.5, 0.03),
                    new THREE.MeshStandardMaterial({ color: 0x444444, transparent: true, opacity: 0.6 }));
                rail.position.set(pos.x + escSide * (bw * 0.5 + 0.55), 2.25 + fe * 3, pos.z);
                scene.add(rail);
            }
        }

        // Awning/canopy at ground level
        if (Math.random() < 0.3 && bh > 6) {
            var awningColors = [0xcc2222, 0x2255aa, 0x228833, 0xaa6622];
            var awning = new THREE.Mesh(
                new THREE.BoxGeometry(bw * 0.6, 0.06, 1.2),
                new THREE.MeshStandardMaterial({ color: awningColors[Math.floor(Math.random() * awningColors.length)] })
            );
            awning.position.set(pos.x, 2.8, pos.z + side * (bd * 0.5 + 0.5));
            awning.rotation.x = side * 0.15;
            scene.add(awning);
        }
    }

    // Add some traffic lights along the track
    for (var tli = 0; tli < 15; tli++) {
        var tlt = tli / 15;
        var tlpt = trackCurve.getPointAt(tlt);
        var tltan = trackCurve.getTangentAt(tlt).normalize();
        var tlright = new THREE.Vector3(-tltan.z, 0, tltan.x);
        var tlside = (tli % 2 === 0) ? 1 : -1;
        var tlpos = tlpt.clone().addScaledVector(tlright, tlside * (ROAD_WIDTH / 2 + 1.2));

        // Traffic light pole
        var tlpole = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 3.5, 4),
            new THREE.MeshStandardMaterial({ color: 0x333333 }));
        tlpole.position.set(tlpos.x, 1.75, tlpos.z);
        scene.add(tlpole);
        // Traffic light box
        var tlbox = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.5, 0.15),
            new THREE.MeshStandardMaterial({ color: 0x222222 }));
        tlbox.position.set(tlpos.x, 3.6, tlpos.z);
        scene.add(tlbox);
        // Green light (always green for racing!)
        var tlgreen = new THREE.Mesh(new THREE.SphereGeometry(0.06, 6, 6),
            new THREE.MeshBasicMaterial({ color: 0x00ff00 }));
        tlgreen.position.set(tlpos.x, 3.45, tlpos.z + 0.08);
        scene.add(tlgreen);
    }

    // Second row of background skyscrapers (skyline depth)
    for (var bg = 0; bg < 30; bg++) {
        var bgt = bg / 30;
        var bgpt = trackCurve.getPointAt(bgt);
        var bgtan = trackCurve.getTangentAt(bgt).normalize();
        var bgright = new THREE.Vector3(-bgtan.z, 0, bgtan.x);
        var bgside = (bg % 2 === 0) ? 1 : -1;
        var bgdist = ROAD_WIDTH / 2 + 30 + Math.random() * 40;

        var bgw = 5 + Math.random() * 10;
        var bgh = 15 + Math.random() * 45;
        var bgd = 5 + Math.random() * 10;

        var bgColors = [0x0a0a1a, 0x0f0f20, 0x080818, 0x101025];
        var bgmat = new THREE.MeshStandardMaterial({
            color: bgColors[Math.floor(Math.random() * bgColors.length)],
            emissive: 0x111133,
            emissiveIntensity: 0.15,
            roughness: 0.85
        });
        var bgmesh = new THREE.Mesh(new THREE.BoxGeometry(bgw, bgh, bgd), bgmat);
        var bgpos = bgpt.clone().addScaledVector(bgright, bgside * bgdist);
        bgmesh.position.set(bgpos.x, bgh / 2, bgpos.z);
        scene.add(bgmesh);

        // Scattered lit windows on back row
        if (bgh > 20) {
            var wRows = Math.floor(bgh / 3);
            var wCols = Math.floor(bgw / 2);
            for (var wr = 0; wr < Math.min(wRows, 8); wr++) {
                for (var wc = 0; wc < Math.min(wCols, 4); wc++) {
                    if (Math.random() < 0.6) continue;
                    var wm = new THREE.Mesh(
                        new THREE.PlaneGeometry(1, 1.2),
                        new THREE.MeshBasicMaterial({
                            color: Math.random() < 0.5 ? 0xffdd88 : 0x88aaff,
                            transparent: true, opacity: 0.4 + Math.random() * 0.3
                        })
                    );
                    wm.position.set(
                        bgpos.x, 3 + wr * 3,
                        bgpos.z + bgside * bgd * 0.51
                    );
                    wm.position.x += (wc - wCols / 2) * 2;
                    wm.rotation.y = (bgside > 0) ? 0 : Math.PI;
                    scene.add(wm);
                }
            }
        }
    }
}

function placeTrackLights() {
    // Street lights along the road
    var numLights = 30;
    for (var i = 0; i < numLights; i++) {
        var t = i / numLights;
        var pt = trackCurve.getPointAt(t);
        var tan = trackCurve.getTangentAt(t).normalize();
        var right = new THREE.Vector3(-tan.z, 0, tan.x);
        var side = (i % 2 === 0) ? 1 : -1;
        var dist = ROAD_WIDTH / 2 + 2.0;

        var pos = pt.clone().addScaledVector(right, side * dist);

        // Street light pole
        var poleMat = new THREE.MeshStandardMaterial({ color: 0x444455, metalness: 0.5, roughness: 0.4 });
        var poleGeo = new THREE.CylinderGeometry(0.06, 0.1, 5, 6);
        var pole = new THREE.Mesh(poleGeo, poleMat);
        pole.position.set(pos.x, 2.5, pos.z);
        scene.add(pole);

        // Curved arm extending over road
        var armGeo = new THREE.BoxGeometry(0.06, 0.06, 2.5);
        var arm = new THREE.Mesh(armGeo, poleMat);
        arm.position.set(pos.x - side * 1.0, 4.9, pos.z);
        arm.rotation.z = side * 0.15;
        scene.add(arm);

        // Light fixture (warm white downlight)
        var fixGeo = new THREE.BoxGeometry(0.4, 0.1, 0.6);
        var fixMat = new THREE.MeshBasicMaterial({ color: 0xffeecc });
        var fixture = new THREE.Mesh(fixGeo, fixMat);
        fixture.position.set(pos.x - side * 2.0, 4.8, pos.z);
        scene.add(fixture);

        // Downward glow cone (visible light cone)
        var coneGeo = new THREE.ConeGeometry(1.5, 4, 6, 1, true);
        var coneMat = new THREE.MeshBasicMaterial({
            color: 0xffeeaa, transparent: true, opacity: 0.04, side: THREE.DoubleSide
        });
        var cone = new THREE.Mesh(coneGeo, coneMat);
        cone.position.set(pos.x - side * 2.0, 2.8, pos.z);
        scene.add(cone);

        // Point light — every other light for perf
        if (i % 2 === 0) {
            var pLight = new THREE.PointLight(0xffeedd, 1.5, 20, 2);
            pLight.position.set(pos.x - side * 2.0, 4.7, pos.z);
            scene.add(pLight);
        }

        // Colored accent at base (neon theme)
        var zone = getTerrainZone(t);
        var accentColor = zone === 'neon' ? 0xff00ff : zone === 'city' ? 0x4488ff : 0x8a2be2;
        var accentGeo = new THREE.BoxGeometry(0.15, 0.5, 0.15);
        var accentMat = new THREE.MeshBasicMaterial({ color: accentColor });
        var accent = new THREE.Mesh(accentGeo, accentMat);
        accent.position.set(pos.x, 0.25, pos.z);
        scene.add(accent);
    }
}

function getTerrainZone(t) {
    for (var i = 0; i < terrainZones.length; i++) {
        if (t >= terrainZones[i].start && t < terrainZones[i].end) return terrainZones[i].type;
    }
    return 'city';
}

// Create car paint texture with racing livery
function createCarTexture(color, carType) {
    var c = document.createElement('canvas');
    c.width = 128; c.height = 128;
    var ctx = c.getContext('2d');
    // Base color
    var r = (color >> 16) & 0xff, g = (color >> 8) & 0xff, b = color & 0xff;
    ctx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
    ctx.fillRect(0, 0, 128, 128);
    // Metallic sheen gradient
    var grad = ctx.createLinearGradient(0, 0, 128, 128);
    grad.addColorStop(0, 'rgba(255,255,255,0.15)');
    grad.addColorStop(0.5, 'rgba(0,0,0,0.1)');
    grad.addColorStop(1, 'rgba(255,255,255,0.1)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 128, 128);
    // Racing stripes based on type
    if (carType === 'lambo' || carType === 'gt') {
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(50, 0, 12, 128);
        ctx.fillRect(66, 0, 12, 128);
    } else if (carType === 'porsche') {
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.fillRect(0, 52, 128, 24);
    } else if (carType === 'ferrari') {
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(56, 0, 16, 128);
    } else if (carType === 'muscle') {
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.fillRect(44, 0, 8, 128);
        ctx.fillRect(76, 0, 8, 128);
    }
    // Number circle
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.arc(32, 64, 14, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(String(Math.floor(Math.random() * 99 + 1)), 32, 70);

    var tex = new THREE.CanvasTexture(c);
    tex.needsUpdate = true;
    return tex;
}

function buildCar(color, isPlayer, carType) {
    carType = carType || 'lambo';
    var group = new THREE.Group();

    // Car dimensions vary by type
    var bLen, bWid, bodyH, cabH, cabW, cabZ, cabLen, hoodSlope, rearSlope;
    switch(carType) {
        case 'lambo': // Aventador style: very low, wide, angular
            bLen = 2.8; bWid = 1.2; bodyH = 0.22; cabH = 0.24; cabW = 0.7;
            cabZ = 0.0; cabLen = 0.35; hoodSlope = 0.08; rearSlope = 0.1; break;
        case 'porsche': // 911 style: round rear, sloped nose
            bLen = 2.5; bWid = 1.05; bodyH = 0.26; cabH = 0.28; cabW = 0.72;
            cabZ = -0.15; cabLen = 0.38; hoodSlope = 0.1; rearSlope = 0.15; break;
        case 'ferrari': // F40 style: mid-engine, long hood
            bLen = 2.7; bWid = 1.1; bodyH = 0.24; cabH = 0.25; cabW = 0.68;
            cabZ = 0.1; cabLen = 0.3; hoodSlope = 0.06; rearSlope = 0.08; break;
        case 'gt': // GT3 style: balanced, big wing
            bLen = 2.6; bWid = 1.15; bodyH = 0.25; cabH = 0.26; cabW = 0.74;
            cabZ = -0.05; cabLen = 0.36; hoodSlope = 0.07; rearSlope = 0.12; break;
        case 'muscle': // Challenger style: high hood, boxy
            bLen = 2.7; bWid = 1.15; bodyH = 0.3; cabH = 0.32; cabW = 0.8;
            cabZ = -0.1; cabLen = 0.4; hoodSlope = 0.04; rearSlope = 0.18; break;
        default:
            bLen = 2.6; bWid = 1.1; bodyH = 0.25; cabH = 0.26; cabW = 0.72;
            cabZ = 0; cabLen = 0.35; hoodSlope = 0.07; rearSlope = 0.12;
    }

    var carTex = createCarTexture(color, carType);
    var bodyMat = new THREE.MeshStandardMaterial({
        map: carTex, color: 0xffffff, metalness: 0.7, roughness: 0.15,
        emissive: color, emissiveIntensity: 0.4
    });
    var darkMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5, metalness: 0.3 });
    var chromeMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.9, roughness: 0.05 });
    var glassMat = new THREE.MeshStandardMaterial({
        color: 0x224466, metalness: 0.8, roughness: 0.1, transparent: true, opacity: 0.55
    });

    // --- Main body ---
    var lower = new THREE.Mesh(new THREE.BoxGeometry(bWid, bodyH, bLen), bodyMat);
    lower.position.y = 0.13 + bodyH / 2;
    lower.castShadow = true;
    group.add(lower);

    // --- Cabin / greenhouse ---
    var cab = new THREE.Mesh(new THREE.BoxGeometry(bWid * cabW, cabH, bLen * cabLen), bodyMat);
    cab.position.set(0, 0.13 + bodyH + cabH / 2, bLen * cabZ * 0.3);
    cab.castShadow = true;
    group.add(cab);

    // --- Front hood (angled down) ---
    var hoodGeo = new THREE.BoxGeometry(bWid * 0.92, 0.06, bLen * 0.28);
    var hood = new THREE.Mesh(hoodGeo, bodyMat);
    hood.position.set(0, 0.13 + bodyH - hoodSlope, bLen * 0.3);
    hood.rotation.x = hoodSlope * 2;
    group.add(hood);

    // --- Rear deck ---
    var rearGeo = new THREE.BoxGeometry(bWid * 0.88, 0.05, bLen * 0.2);
    var rear = new THREE.Mesh(rearGeo, bodyMat);
    rear.position.set(0, 0.13 + bodyH - rearSlope * 0.5, -bLen * 0.35);
    rear.rotation.x = -rearSlope;
    group.add(rear);

    // --- Front splitter ---
    var splitter = new THREE.Mesh(new THREE.BoxGeometry(bWid * 1.04, 0.04, 0.14), darkMat);
    splitter.position.set(0, 0.12, bLen * 0.5);
    group.add(splitter);

    // --- Rear diffuser ---
    var diffuser = new THREE.Mesh(new THREE.BoxGeometry(bWid * 0.92, 0.06, 0.16), darkMat);
    diffuser.position.set(0, 0.12, -bLen * 0.48);
    group.add(diffuser);

    // --- Side air intakes (lambo/ferrari specific) ---
    if (carType === 'lambo' || carType === 'ferrari') {
        for (var ai = -1; ai <= 1; ai += 2) {
            var intake = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.12, bLen * 0.2), darkMat);
            intake.position.set(ai * bWid * 0.51, 0.22, -bLen * 0.1);
            group.add(intake);
        }
    }

    // --- Side skirts ---
    for (var sk = -1; sk <= 1; sk += 2) {
        var skirt = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.1, bLen * 0.8), darkMat);
        skirt.position.set(sk * bWid * 0.52, 0.15, 0);
        group.add(skirt);
    }

    // --- Fender flares (wider rear for porsche) ---
    if (carType === 'porsche') {
        for (var ff = -1; ff <= 1; ff += 2) {
            var flare = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.15, bLen * 0.25), bodyMat);
            flare.position.set(ff * (bWid * 0.54), 0.2, -bLen * 0.28);
            group.add(flare);
        }
    }

    // --- Windshield ---
    var wsW = bWid * cabW * 0.95;
    var ws = new THREE.Mesh(new THREE.BoxGeometry(wsW, cabH * 0.85, 0.04), glassMat);
    ws.position.set(0, 0.13 + bodyH + cabH * 0.4, bLen * (cabZ * 0.3 + cabLen * 0.5));
    ws.rotation.x = 0.45;
    group.add(ws);

    // --- Rear window ---
    var rw = new THREE.Mesh(new THREE.BoxGeometry(wsW * 0.85, cabH * 0.7, 0.04), glassMat);
    rw.position.set(0, 0.13 + bodyH + cabH * 0.35, bLen * (cabZ * 0.3 - cabLen * 0.5));
    rw.rotation.x = -0.35;
    group.add(rw);

    // --- Side windows ---
    for (var sw = -1; sw <= 1; sw += 2) {
        var swM = new THREE.Mesh(new THREE.BoxGeometry(0.04, cabH * 0.65, bLen * cabLen * 0.7), glassMat);
        swM.position.set(sw * bWid * cabW * 0.5, 0.13 + bodyH + cabH * 0.4, bLen * cabZ * 0.3);
        group.add(swM);
    }

    // --- Spoiler (bigger for GT and lambo) ---
    var spoilerScale = (carType === 'gt' || carType === 'lambo') ? 1.2 : (carType === 'muscle' ? 0.6 : 0.9);
    if (spoilerScale > 0.3) {
        var spoiler = new THREE.Mesh(new THREE.BoxGeometry(bWid * spoilerScale, 0.04, 0.14), darkMat);
        var spoilerY = (carType === 'gt') ? 0.75 : 0.65;
        spoiler.position.set(0, spoilerY, -bLen * 0.44);
        group.add(spoiler);
        // Supports
        for (var ss = -1; ss <= 1; ss += 2) {
            var sup = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.16, 0.04), chromeMat);
            sup.position.set(ss * bWid * 0.35, spoilerY - 0.1, -bLen * 0.44);
            group.add(sup);
        }
    }

    // --- Hood scoop (muscle car) ---
    if (carType === 'muscle') {
        var scoop = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.12, 0.35), darkMat);
        scoop.position.set(0, 0.13 + bodyH + 0.06, bLen * 0.25);
        group.add(scoop);
    }

    // --- Headlights ---
    for (var hl = -1; hl <= 1; hl += 2) {
        // Light housing
        var hlW = (carType === 'lambo') ? 0.25 : 0.18;
        var hlH = (carType === 'porsche') ? 0.08 : 0.06;
        var hlMesh = new THREE.Mesh(new THREE.BoxGeometry(hlW, hlH, 0.06),
            new THREE.MeshBasicMaterial({ color: 0xffffff }));
        hlMesh.position.set(hl * bWid * 0.36, 0.13 + bodyH * 0.7, bLen * 0.51);
        group.add(hlMesh);
        // DRL strip
        var drl = new THREE.Mesh(new THREE.BoxGeometry(hlW * 0.8, 0.02, 0.02),
            new THREE.MeshBasicMaterial({ color: 0xccddff }));
        drl.position.set(hl * bWid * 0.36, 0.13 + bodyH * 0.5, bLen * 0.51);
        group.add(drl);

        if (isPlayer) {
            var hlLight = new THREE.SpotLight(0xffffff, 2, 30, 0.35, 0.5);
            hlLight.position.set(hl * bWid * 0.36, 0.13 + bodyH * 0.7, bLen * 0.5);
            hlLight.target.position.set(hl * bWid * 0.1, 0, bLen * 0.5 + 10);
            group.add(hlLight);
            group.add(hlLight.target);
        }
    }

    // --- Tail lights ---
    group.userData.tailLights = [];
    for (var tl = -1; tl <= 1; tl += 2) {
        var tlMesh = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.05, 0.04),
            new THREE.MeshBasicMaterial({ color: 0xff0022 }));
        tlMesh.position.set(tl * bWid * 0.35, 0.13 + bodyH * 0.6, -bLen * 0.51);
        group.add(tlMesh);
        group.userData.tailLights.push(tlMesh);
    }
    // Center tail strip
    var ctl = new THREE.Mesh(new THREE.BoxGeometry(bWid * 0.35, 0.03, 0.03),
        new THREE.MeshBasicMaterial({ color: 0xff0022 }));
    ctl.position.set(0, 0.13 + bodyH * 0.6, -bLen * 0.51);
    group.add(ctl);

    // --- Side mirrors ---
    for (var sm = -1; sm <= 1; sm += 2) {
        var mir = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.05, 0.06), chromeMat);
        mir.position.set(sm * (bWid * 0.55), 0.13 + bodyH + 0.08, bLen * 0.1);
        group.add(mir);
    }

    // --- Wheels with tire tread texture ---
    // Procedural tire texture
    var tireCanvas = document.createElement('canvas');
    tireCanvas.width = 64; tireCanvas.height = 64;
    var tc = tireCanvas.getContext('2d');
    tc.fillStyle = '#1a1a1a';
    tc.fillRect(0, 0, 64, 64);
    // Tread pattern
    tc.fillStyle = '#111111';
    for (var tp = 0; tp < 8; tp++) {
        tc.fillRect(0, tp * 8, 64, 3);
    }
    tc.fillStyle = '#222222';
    for (var ts = 0; ts < 6; ts++) {
        tc.fillRect(ts * 11, 0, 4, 64);
    }
    var tireTex = new THREE.CanvasTexture(tireCanvas);
    tireTex.wrapS = THREE.RepeatWrapping;
    tireTex.wrapT = THREE.RepeatWrapping;
    tireTex.needsUpdate = true;

    var tireMat = new THREE.MeshStandardMaterial({ map: tireTex, roughness: 0.9, metalness: 0.05 });
    var rimMat = new THREE.MeshStandardMaterial({ color: 0xbbbbbb, metalness: 0.9, roughness: 0.05 });
    var rearWider = (carType === 'porsche' || carType === 'muscle') ? 1.08 : 1.0;
    var wheelPositions = [
        [-bWid * 0.52, 0.16, bLen * 0.34, 1.0],
        [bWid * 0.52, 0.16, bLen * 0.34, 1.0],
        [-bWid * 0.52, 0.16, -bLen * 0.34, rearWider],
        [bWid * 0.52, 0.16, -bLen * 0.34, rearWider]
    ];

    group.userData.wheels = [];
    for (var wi = 0; wi < wheelPositions.length; wi++) {
        var wheelGroup = new THREE.Group();
        var wScale = wheelPositions[wi][3];
        // Tire with treads
        var tire = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.12 * wScale, 14), tireMat);
        tire.rotation.z = Math.PI / 2;
        wheelGroup.add(tire);
        // Sidewall (dark ring)
        for (var swl = -1; swl <= 1; swl += 2) {
            var sideWall = new THREE.Mesh(
                new THREE.RingGeometry(0.13, 0.2, 14),
                new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.95, side: THREE.DoubleSide })
            );
            sideWall.rotation.y = Math.PI / 2;
            sideWall.position.x = swl * 0.061 * wScale;
            wheelGroup.add(sideWall);
        }
        // Rim with spoke design
        var rim = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.13, 0.13 * wScale, 12), rimMat);
        rim.rotation.z = Math.PI / 2;
        wheelGroup.add(rim);
        // Multi-spoke design
        var numSpokes = (carType === 'lambo') ? 7 : (carType === 'muscle') ? 5 : 6;
        for (var sp = 0; sp < numSpokes; sp++) {
            var spoke = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.012, 0.012), rimMat);
            spoke.rotation.z = (sp / numSpokes) * Math.PI;
            wheelGroup.add(spoke);
        }
        // Center hub
        var hub = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.14 * wScale, 6), chromeMat);
        hub.rotation.z = Math.PI / 2;
        wheelGroup.add(hub);

        wheelGroup.position.set(wheelPositions[wi][0], wheelPositions[wi][1], wheelPositions[wi][2]);
        group.add(wheelGroup);
        group.userData.wheels.push(wheelGroup);
    }

    // --- Exhaust tips ---
    var numExhausts = (carType === 'lambo' || carType === 'muscle') ? 2 : 1;
    for (var ex = -numExhausts; ex <= numExhausts; ex += 2) {
        if (ex === 0 && numExhausts > 1) continue;
        var exM = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.045, 0.14, 6), chromeMat);
        exM.rotation.x = Math.PI / 2;
        exM.position.set(ex * 0.15, 0.14, -bLen * 0.54);
        group.add(exM);
    }

    // --- Underbody neon glow ---
    var under = new THREE.Mesh(
        new THREE.PlaneGeometry(bWid * 0.85, bLen * 0.85),
        new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.35, side: THREE.DoubleSide })
    );
    under.rotation.x = -Math.PI / 2;
    under.position.y = 0.03;
    group.add(under);

    // --- Neon trim lines ---
    var trimMat = new THREE.MeshBasicMaterial({ color: color });
    var trimF = new THREE.Mesh(new THREE.BoxGeometry(bWid * 1.01, 0.02, 0.02), trimMat);
    trimF.position.set(0, 0.12, bLen * 0.3);
    group.add(trimF);
    var trimR = trimF.clone();
    trimR.position.z = -bLen * 0.3;
    group.add(trimR);
    // Side neon strips
    for (var ns = -1; ns <= 1; ns += 2) {
        var sideNeon = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.02, bLen * 0.7), trimMat);
        sideNeon.position.set(ns * bWid * 0.5, 0.12, 0);
        group.add(sideNeon);
    }

    // Car data
    group.userData.trackT = 0;
    group.userData.laneOffset = 0;
    group.userData.speed = 0;
    group.userData.maxSpeed = 45;
    group.userData.acceleration = 18;
    group.userData.brakeForce = 30;
    group.userData.currentLane = 1;
    group.userData.targetLaneOffset = 0;
    group.userData.nos = MAX_NOS;
    group.userData.nosActive = false;
    group.userData.lap = 0;
    group.userData.lastCheckT = 0;
    group.userData.finished = false;
    group.userData.finishTime = 0;
    group.userData.totalDist = 0;
    group.userData.velY = 0;
    group.userData.onGround = true;
    group.userData.collisionCooldown = 0;
    group.userData.color = color;
    group.userData.steerAngle = 0;

    scene.add(group);
    return group;
}

function spawnCars() {
    // Player always gets a Lamborghini
    playerCar = buildCar(CAR_COLORS[0], true, 'lambo');
    playerCar.userData.trackT = 0.0;
    playerCar.userData.laneOffset = 0;
    playerCar.userData.currentLane = 1;

    // AI get different car types
    aiCars = [];
    var aiTypes = ['porsche', 'ferrari', 'gt', 'muscle', 'lambo'];
    for (var i = 0; i < NUM_AI; i++) {
        var car = buildCar(AI_COLORS[i % AI_COLORS.length], false, aiTypes[i % aiTypes.length]);
        car.userData.trackT = 0.0;
        car.userData.laneOffset = ((i % NUM_LANES) - 1.5) * LANE_W;
        car.userData.currentLane = i % NUM_LANES;
        car.userData.targetLaneOffset = car.userData.laneOffset;
        car.userData.aiSkill = 0.7 + Math.random() * 0.3;
        car.userData.aiAggression = 0.3 + Math.random() * 0.5;
        car.userData.maxSpeed = 32 + Math.random() * 16;
        aiCars.push(car);
    }

    // Stagger starting positions
    for (var j = 0; j < aiCars.length; j++) {
        aiCars[j].userData.trackT = -((j + 1) * 0.004);
        if (aiCars[j].userData.trackT < 0) aiCars[j].userData.trackT += 1;
    }
}

// ================================================================
//  AUDIO
// ================================================================
function initAudio() {
    if (audioCtx) return;
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) { return; }
}

function startEngineSound() {
    if (!audioCtx) return;
    try {
        engineOscA = audioCtx.createOscillator();
        engineOscB = audioCtx.createOscillator();
        engineGain = audioCtx.createGain();
        engineOscA.type = 'sawtooth';
        engineOscB.type = 'square';
        engineOscA.frequency.value = 80;
        engineOscB.frequency.value = 40;
        engineGain.gain.value = 0.04;
        engineOscA.connect(engineGain);
        engineOscB.connect(engineGain);
        engineGain.connect(audioCtx.destination);
        engineOscA.start();
        engineOscB.start();
    } catch(e) {}
}

function updateEngineSound(spd, maxSpd, nosActive) {
    if (!engineOscA || !audioCtx) return;
    try {
        var t = Math.min(spd / maxSpd, 1);
        var baseFreq = 60 + t * 160;
        if (nosActive) baseFreq += 40;
        engineOscA.frequency.setTargetAtTime(baseFreq, audioCtx.currentTime, 0.05);
        engineOscB.frequency.setTargetAtTime(baseFreq * 0.5, audioCtx.currentTime, 0.05);
        engineGain.gain.setTargetAtTime(0.02 + t * 0.05, audioCtx.currentTime, 0.05);
    } catch(e) {}
}

function stopEngineSound() {
    try {
        if (engineOscA) { engineOscA.stop(); engineOscA = null; }
        if (engineOscB) { engineOscB.stop(); engineOscB = null; }
    } catch(e) {}
}

function playSound(freq, dur, type, vol) {
    if (!audioCtx) return;
    try {
        var o = audioCtx.createOscillator();
        var g = audioCtx.createGain();
        o.type = type || 'sine';
        o.frequency.value = freq;
        g.gain.value = vol || 0.1;
        o.connect(g).connect(audioCtx.destination);
        o.start();
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
        o.stop(audioCtx.currentTime + dur + 0.01);
    } catch(e) {}
}

function playCrashSound() {
    if (!audioCtx) return;
    try {
        var len = Math.floor(audioCtx.sampleRate * 0.25);
        var buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
        var d = buf.getChannelData(0);
        for (var i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2);
        var s = audioCtx.createBufferSource(); s.buffer = buf;
        var g = audioCtx.createGain(); g.gain.value = 0.3;
        s.connect(g).connect(audioCtx.destination); s.start();
    } catch(e) {}
}

function playNosSound() {
    playSound(200, 0.3, 'sawtooth', 0.08);
    playSound(150, 0.5, 'square', 0.05);
}
