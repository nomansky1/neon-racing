<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON RACING</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
            touch-action: none;           /* prevent all browser touch gestures */
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        canvas {
            display: block;
            width: 100%; height: 100%;
        }
    </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ============================================================
//  NEON RACING — single-file HTML5 endless racer
// ============================================================

// --- Canvas setup ---
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    recalcLanes();
}
window.addEventListener('resize', resize);
resize();

// --- Constants ---
const CAR_W = 40;
const CAR_H = 70;
const NUM_LANES = 3;
const ROAD_FRAC = 0.6;              // road occupies 60 % of screen width
const LANE_CHANGE_SPEED = 0.15;     // interpolation factor per frame
const BASE_SPEED = 4;
const MAX_SPEED = 18;
const SPEED_INC = 0.002;            // per frame
const SPAWN_INTERVAL_MIN = 30;      // frames between obstacle spawns (at max speed)
const SPAWN_INTERVAL_MAX = 90;      // frames between obstacle spawns (at base speed)
const PARTICLE_LIFE = 30;

// Colors
const CLR_ROAD       = '#0a0a0a';
const CLR_EDGE       = '#8a2be2';   // purple
const CLR_LANE       = '#4444ff';   // blue lane dashes
const CLR_PLAYER     = '#39ff14';   // neon green
const CLR_OBSTACLE   = '#ff4500';   // orange-red
const CLR_PARTICLE   = '#00ffff';   // cyan
const CLR_SPEED_LINE = 'rgba(0,255,255,0.25)';

// --- Derived layout (recalculated on resize) ---
let roadLeft, roadRight, roadW, laneW, laneX;

function recalcLanes() {
    roadW     = Math.min(canvas.width * ROAD_FRAC, 280);
    roadLeft  = (canvas.width - roadW) / 2;
    roadRight = roadLeft + roadW;
    laneW     = roadW / NUM_LANES;
    laneX     = [0, 1, 2].map(i => roadLeft + laneW * i + laneW / 2);
}

// --- Game state ---
let state = 'menu';   // menu | playing | gameover
let score, speed, spawnTimer, spawnInterval;
let player = null;
let obstacles = [];
let particles = [];
let speedLines = [];
let highScore = parseInt(localStorage.getItem('neonRacingHigh')) || 0;
let dashOffset = 0;    // animated lane dashes
let lastTime = 0;

// --- Audio (Web Audio API) ---
let audioCtx = null;
let engineOsc = null, engineGain = null;

function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function startEngine() {
    if (!audioCtx) return;
    engineOsc  = audioCtx.createOscillator();
    engineGain = audioCtx.createGain();
    engineOsc.type = 'sawtooth';
    engineOsc.frequency.value = 80;
    engineGain.gain.value = 0.06;
    engineOsc.connect(engineGain).connect(audioCtx.destination);
    engineOsc.start();
}

function updateEngineSound() {
    if (!engineOsc) return;
    // pitch rises with speed
    engineOsc.frequency.value = 60 + (speed - BASE_SPEED) / (MAX_SPEED - BASE_SPEED) * 120;
    engineGain.gain.value = 0.04 + (speed / MAX_SPEED) * 0.05;
}

function stopEngine() {
    if (engineOsc) { engineOsc.stop(); engineOsc = null; }
}

function playBlip() {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.value = 880;
    g.gain.value = 0.12;
    o.connect(g).connect(audioCtx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
    o.stop(audioCtx.currentTime + 0.1);
}

function playCrash() {
    if (!audioCtx) return;
    const bufferSize = audioCtx.sampleRate * 0.3;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
    const src = audioCtx.createBufferSource();
    src.buffer = buffer;
    const g = audioCtx.createGain();
    g.gain.value = 0.25;
    src.connect(g).connect(audioCtx.destination);
    src.start();
}

// --- Player ---
function resetPlayer() {
    player = {
        lane: 1,
        x: laneX[1],
        y: canvas.height - CAR_H - 40,
        w: CAR_W,
        h: CAR_H
    };
}

// --- Obstacles ---
function spawnObstacle() {
    // pick 1-2 lanes (never all 3)
    const count = Math.random() < 0.3 ? 2 : 1;
    const lanes = [];
    while (lanes.length < count) {
        const l = Math.floor(Math.random() * NUM_LANES);
        if (!lanes.includes(l)) lanes.push(l);
    }
    lanes.forEach(l => {
        obstacles.push({
            x: laneX[l],
            y: -CAR_H,
            w: CAR_W,
            h: CAR_H,
            lane: l,
            color: Math.random() < 0.5 ? '#ff4500' : '#ff2222'
        });
    });
}

// --- Particles ---
function emitTrail() {
    particles.push({
        x: player.x + (Math.random() - 0.5) * 10,
        y: player.y + player.h,
        vx: (Math.random() - 0.5) * 0.5,
        vy: speed * 0.3 + Math.random(),
        life: PARTICLE_LIFE,
        maxLife: PARTICLE_LIFE,
        r: 2 + Math.random() * 3
    });
}

function emitExplosion(x, y) {
    for (let i = 0; i < 30; i++) {
        const angle = Math.random() * Math.PI * 2;
        const spd = 1 + Math.random() * 4;
        particles.push({
            x, y,
            vx: Math.cos(angle) * spd,
            vy: Math.sin(angle) * spd,
            life: 40,
            maxLife: 40,
            r: 2 + Math.random() * 4,
            explosion: true
        });
    }
}

// --- Speed lines ---
function spawnSpeedLine() {
    const side = Math.random() < 0.5 ? roadLeft - Math.random() * 40 : roadRight + Math.random() * 40;
    speedLines.push({
        x: side,
        y: -20,
        len: 20 + Math.random() * 40,
        speed: speed * (0.8 + Math.random() * 0.4)
    });
}

// --- Collision (AABB) ---
function collides(a, b) {
    return (
        a.x - a.w / 2 < b.x + b.w / 2 &&
        a.x + a.w / 2 > b.x - b.w / 2 &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
    );
}

// --- Start / restart ---
function startGame() {
    initAudio();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    score = 0;
    speed = BASE_SPEED;
    spawnTimer = 0;
    spawnInterval = SPAWN_INTERVAL_MAX;
    obstacles = [];
    particles = [];
    speedLines = [];
    recalcLanes();
    resetPlayer();
    state = 'playing';
    startEngine();
}

function gameOver() {
    state = 'gameover';
    stopEngine();
    playCrash();
    emitExplosion(player.x, player.y);
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('neonRacingHigh', highScore);
    }
}

// --- Input ---
function handleInput(x) {
    if (state === 'menu' || state === 'gameover') {
        startGame();
        return;
    }
    if (state === 'playing') {
        if (x < canvas.width / 2) {
            if (player.lane > 0) { player.lane--; playBlip(); }
        } else {
            if (player.lane < NUM_LANES - 1) { player.lane++; playBlip(); }
        }
    }
}

canvas.addEventListener('touchstart', e => { e.preventDefault(); handleInput(e.touches[0].clientX); }, { passive: false });
canvas.addEventListener('touchmove',  e => { e.preventDefault(); }, { passive: false });
canvas.addEventListener('mousedown',  e => { handleInput(e.clientX); });

// --- Update ---
function update() {
    if (state !== 'playing') return;

    // Speed ramp
    if (speed < MAX_SPEED) speed += SPEED_INC;

    // Score
    score += Math.round(speed);

    // Smooth lane change
    const targetX = laneX[player.lane];
    player.x += (targetX - player.x) * LANE_CHANGE_SPEED;
    player.y = canvas.height - CAR_H - 40;  // keep Y anchored after resize

    // Spawn obstacles
    spawnInterval = SPAWN_INTERVAL_MAX - (speed - BASE_SPEED) / (MAX_SPEED - BASE_SPEED) * (SPAWN_INTERVAL_MAX - SPAWN_INTERVAL_MIN);
    spawnTimer++;
    if (spawnTimer >= spawnInterval) {
        spawnObstacle();
        spawnTimer = 0;
    }

    // Move obstacles
    for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].y += speed;
        if (obstacles[i].y > canvas.height + 100) {
            obstacles.splice(i, 1);
            continue;
        }
        if (collides(player, obstacles[i])) {
            gameOver();
            return;
        }
    }

    // Trail particles
    if (Math.random() < 0.6) emitTrail();

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }

    // Speed lines
    if (Math.random() < 0.3 + speed / MAX_SPEED * 0.5) spawnSpeedLine();
    for (let i = speedLines.length - 1; i >= 0; i--) {
        speedLines[i].y += speedLines[i].speed;
        if (speedLines[i].y > canvas.height + 60) speedLines.splice(i, 1);
    }

    // Lane-dash scroll
    dashOffset = (dashOffset + speed) % 40;

    updateEngineSound();
}

// --- Draw helpers ---
function drawGlow(color, blur, fn) {
    ctx.save();
    ctx.shadowColor = color;
    ctx.shadowBlur = blur;
    fn();
    ctx.restore();
}

// Polyfill-safe rounded rectangle (older Safari/Android lack roundRect)
function fillRoundRect(x, y, w, h, r) {
    if (typeof r === 'number') r = [r, r, r, r];
    const [tl, tr, br, bl] = r;
    ctx.beginPath();
    ctx.moveTo(x + tl, y);
    ctx.lineTo(x + w - tr, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + tr);
    ctx.lineTo(x + w, y + h - br);
    ctx.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
    ctx.lineTo(x + bl, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - bl);
    ctx.lineTo(x, y + tl);
    ctx.quadraticCurveTo(x, y, x + tl, y);
    ctx.closePath();
    ctx.fill();
}

function drawCar(x, y, w, h, color) {
    // Car body with glow
    drawGlow(color, 18, () => {
        ctx.fillStyle = color;
        // main body
        const bx = x - w / 2, by = y;
        fillRoundRect(bx + 4, by, w - 8, h, [6, 6, 4, 4]);
        // wider middle section
        fillRoundRect(bx, by + h * 0.25, w, h * 0.45, 4);
        // windshield
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        fillRoundRect(bx + 8, by + 8, w - 16, h * 0.22, 3);
        // rear lights
        ctx.fillStyle = '#fff';
        ctx.fillRect(bx + 4, by + h - 6, 6, 4);
        ctx.fillRect(bx + w - 10, by + h - 6, 6, 4);
    });
}

// --- Main draw ---
function draw() {
    const W = canvas.width, H = canvas.height;

    // Clear
    ctx.fillStyle = '#050508';
    ctx.fillRect(0, 0, W, H);

    // Road surface
    ctx.fillStyle = CLR_ROAD;
    ctx.fillRect(roadLeft, 0, roadW, H);

    // Road edges (glowing purple)
    drawGlow(CLR_EDGE, 14, () => {
        ctx.strokeStyle = CLR_EDGE;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(roadLeft, 0); ctx.lineTo(roadLeft, H);
        ctx.moveTo(roadRight, 0); ctx.lineTo(roadRight, H);
        ctx.stroke();
    });

    // Lane dashes (glowing blue)
    drawGlow(CLR_LANE, 8, () => {
        ctx.strokeStyle = CLR_LANE;
        ctx.lineWidth = 2;
        ctx.setLineDash([20, 20]);
        ctx.lineDashOffset = -dashOffset;
        for (let i = 1; i < NUM_LANES; i++) {
            const lx = roadLeft + laneW * i;
            ctx.beginPath();
            ctx.moveTo(lx, 0);
            ctx.lineTo(lx, H);
            ctx.stroke();
        }
        ctx.setLineDash([]);
    });

    // Speed lines
    ctx.lineWidth = 1;
    speedLines.forEach(sl => {
        ctx.strokeStyle = CLR_SPEED_LINE;
        ctx.beginPath();
        ctx.moveTo(sl.x, sl.y);
        ctx.lineTo(sl.x, sl.y + sl.len);
        ctx.stroke();
    });

    // Particles (behind cars)
    particles.forEach(p => {
        const alpha = p.life / p.maxLife;
        const color = p.explosion
            ? `rgba(255,${Math.floor(100 + 155 * alpha)},0,${alpha})`
            : `rgba(0,255,255,${alpha * 0.7})`;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * alpha, 0, Math.PI * 2);
        ctx.fill();
    });

    // Obstacles
    obstacles.forEach(o => drawCar(o.x, o.y, o.w, o.h, o.color));

    // Player
    if (state === 'playing') drawCar(player.x, player.y, player.w, player.h, CLR_PLAYER);

    // HUD — score
    if (state === 'playing') {
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 20px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(score.toLocaleString(), W / 2, 36);

        // Speed indicator
        ctx.font = '13px monospace';
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        const mph = Math.round((speed / MAX_SPEED) * 200 + 40);
        ctx.fillText(mph + ' MPH', W / 2, 56);
    }

    // --- Screens ---
    if (state === 'menu') drawMenuScreen(W, H);
    if (state === 'gameover') drawGameOverScreen(W, H);
}

function drawMenuScreen(W, H) {
    // Dim overlay
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 0, W, H);

    ctx.textAlign = 'center';

    // Title
    drawGlow('#39ff14', 30, () => {
        ctx.fillStyle = CLR_PLAYER;
        ctx.font = 'bold 48px monospace';
        ctx.fillText('NEON', W / 2, H * 0.32);
        ctx.fillText('RACING', W / 2, H * 0.32 + 56);
    });

    // Decorative line
    drawGlow(CLR_EDGE, 10, () => {
        ctx.strokeStyle = CLR_EDGE;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(W / 2 - 80, H * 0.32 + 75);
        ctx.lineTo(W / 2 + 80, H * 0.32 + 75);
        ctx.stroke();
    });

    // Prompt
    const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 300);
    ctx.fillStyle = `rgba(255,255,255,${0.5 + pulse * 0.5})`;
    ctx.font = '22px monospace';
    ctx.fillText('TAP TO RACE', W / 2, H * 0.55);

    // High score
    if (highScore > 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.font = '14px monospace';
        ctx.fillText('BEST: ' + highScore.toLocaleString(), W / 2, H * 0.65);
    }

    // Controls hint
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '12px monospace';
    ctx.fillText('TAP LEFT / RIGHT TO STEER', W / 2, H * 0.78);
}

function drawGameOverScreen(W, H) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);

    ctx.textAlign = 'center';

    // Game over text
    drawGlow('#ff2222', 24, () => {
        ctx.fillStyle = '#ff2222';
        ctx.font = 'bold 42px monospace';
        ctx.fillText('GAME OVER', W / 2, H * 0.30);
    });

    // Score
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 28px monospace';
    ctx.fillText(score.toLocaleString(), W / 2, H * 0.42);
    ctx.font = '14px monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText('SCORE', W / 2, H * 0.42 + 24);

    // High score
    drawGlow('#ffcc00', 10, () => {
        ctx.fillStyle = '#ffcc00';
        ctx.font = 'bold 20px monospace';
        ctx.fillText('BEST: ' + highScore.toLocaleString(), W / 2, H * 0.56);
    });

    if (score >= highScore && score > 0) {
        ctx.fillStyle = '#ffcc00';
        ctx.font = '14px monospace';
        ctx.fillText('NEW RECORD!', W / 2, H * 0.56 + 24);
    }

    // Retry prompt
    const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 300);
    ctx.fillStyle = `rgba(255,255,255,${0.5 + pulse * 0.5})`;
    ctx.font = '20px monospace';
    ctx.fillText('TAP TO TRY AGAIN', W / 2, H * 0.72);
}

// --- Main loop ---
function loop(ts) {
    requestAnimationFrame(loop);
    update();
    draw();
}

// Kick off
requestAnimationFrame(loop);
</script>
</body>
</html>
