<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>NEON RACING</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;position:fixed;top:0;left:0;font-family:'Courier New',monospace}
#game-canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%}
#hud{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:rgba(0,0,0,0.75)}
#overlay.hidden{display:none}
#overlay h1{font-size:48px;color:#39ff14;text-shadow:0 0 30px #39ff14,0 0 60px #39ff14;margin-bottom:8px;letter-spacing:4px}
#overlay h2{font-size:16px;color:#8a2be2;margin-bottom:30px;letter-spacing:6px}
.menu-btn{pointer-events:all;background:rgba(138,43,226,0.2);border:2px solid #8a2be2;color:#fff;padding:14px 36px;margin:8px;font-size:18px;font-family:'Courier New',monospace;cursor:pointer;border-radius:8px;min-width:160px;text-align:center;transition:all 0.2s}
.menu-btn:hover,.menu-btn:active,.menu-btn.selected{background:rgba(57,255,20,0.25);border-color:#39ff14;color:#39ff14;box-shadow:0 0 20px rgba(57,255,20,0.3)}
.lap-row{display:flex;gap:10px;margin:16px 0}
#result-box{text-align:center;color:#fff}
#result-box .pos{font-size:60px;font-weight:bold;color:#ffcc00;text-shadow:0 0 20px #ffcc00}
#result-box .detail{font-size:16px;color:rgba(255,255,255,0.6);margin:6px}
/* HUD Controls */
.ctrl-btn{position:fixed;pointer-events:all;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:bold;font-family:'Courier New',monospace;z-index:15;border:2px solid rgba(138,43,226,0.6);background:rgba(20,10,40,0.45);color:rgba(255,255,255,0.8);-webkit-tap-highlight-color:transparent}
.ctrl-btn:active,.ctrl-btn.active{background:rgba(57,255,20,0.3);border-color:#39ff14;color:#39ff14;box-shadow:0 0 15px rgba(57,255,20,0.4)}
#btn-left{bottom:100px;left:12px;width:70px;height:70px}
#btn-right{bottom:100px;left:92px;width:70px;height:70px}
#btn-gas{bottom:12px;right:12px;width:90px;height:80px;background:rgba(0,100,0,0.4);border-color:rgba(57,255,20,0.6)}
#btn-gas:active,#btn-gas.active{background:rgba(57,255,20,0.4);border-color:#39ff14}
#btn-brake{bottom:12px;right:112px;width:80px;height:80px;background:rgba(100,0,0,0.4);border-color:rgba(255,50,50,0.6)}
#btn-brake:active,#btn-brake.active{background:rgba(255,50,50,0.4);border-color:#ff3232}
#btn-nos{bottom:100px;right:12px;width:70px;height:60px;background:rgba(0,50,100,0.4);border-color:rgba(0,200,255,0.6);font-size:16px}
#btn-nos:active,#btn-nos.active{background:rgba(0,200,255,0.4);border-color:#00c8ff;box-shadow:0 0 20px rgba(0,200,255,0.5)}
#hud-top{position:fixed;top:0;left:0;width:100%;padding:8px 14px;display:flex;justify-content:space-between;align-items:flex-start;z-index:15;pointer-events:none}
.hud-box{background:rgba(5,5,15,0.7);border:1px solid rgba(138,43,226,0.4);border-radius:8px;padding:6px 12px;color:#fff;font-size:13px;line-height:1.5}
#speedo{position:fixed;bottom:100px;right:100px;z-index:15;pointer-events:none;color:#39ff14;font-size:28px;font-weight:bold;text-shadow:0 0 10px #39ff14;text-align:right}
#speedo small{font-size:12px;color:rgba(255,255,255,0.5)}
#nos-bar{position:fixed;bottom:168px;right:14px;width:66px;height:8px;border:1px solid rgba(0,200,255,0.5);border-radius:4px;z-index:15;overflow:hidden;pointer-events:none}
#nos-fill{width:100%;height:100%;background:linear-gradient(90deg,#0066cc,#00ccff);transition:width 0.1s}
#minimap{position:fixed;top:60px;right:10px;width:80px;height:80px;z-index:15;pointer-events:none}
</style>
</head>
<body>

<!-- Overlay Screens -->
<div id="overlay">
    <h1>NEON</h1>
    <h1 style="margin-top:-10px">RACING</h1>
    <h2>CYBER EDITION</h2>
    <div id="menu-main">
        <div style="color:rgba(255,255,255,0.6);margin-bottom:12px;font-size:14px">SELECT LAPS</div>
        <div class="lap-row" id="lap-select"></div>
        <div class="menu-btn" id="btn-start" style="margin-top:20px;font-size:22px">START RACE</div>
    </div>
    <div id="result-box" style="display:none"></div>
</div>

<!-- HUD -->
<div id="hud-top" style="display:none">
    <div class="hud-box" id="hud-pos">POS: -</div>
    <div class="hud-box" id="hud-lap">LAP: -</div>
</div>
<div id="speedo" style="display:none">0<br><small>MPH</small></div>
<div id="nos-bar" style="display:none"><div id="nos-fill"></div></div>
<canvas id="minimap" style="display:none"></canvas>

<!-- Controls -->
<div id="btn-left" class="ctrl-btn" style="display:none">&#9664;</div>
<div id="btn-right" class="ctrl-btn" style="display:none">&#9654;</div>
<div id="btn-gas" class="ctrl-btn" style="display:none">GAS</div>
<div id="btn-brake" class="ctrl-btn" style="display:none">BRK</div>
<div id="btn-nos" class="ctrl-btn" style="display:none">NOS</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
'use strict';

// ================================================================
//  CONFIG
// ================================================================
var NUM_AI = 5;
var TRACK_RADIUS = 300;
var TRACK_SEGS = 200;
var ROAD_WIDTH = 24;
var NUM_LANES = 4;
var LANE_W = ROAD_WIDTH / NUM_LANES;
var MAX_NOS = 100;
var NOS_DRAIN = 0.6;
var NOS_REGEN = 0.08;
var NOS_BOOST = 1.6;
var GRAVITY = -30;
var CAR_COLORS = [0x39ff14, 0xff4500, 0x00bfff, 0xff1493, 0xffd700, 0xff6600];
var AI_COLORS = [0xff4500, 0x00bfff, 0xff1493, 0xffd700, 0xff6600];

// ================================================================
//  GLOBALS
// ================================================================
var scene, camera, renderer, clock;
var trackPoints = [], trackLength = 0, trackCurve;
var playerCar, aiCars = [];
var state = 'menu'; // menu, countdown, racing, finished
var selectedLaps = 3;
var totalLaps;
var countdownTimer = 0;
var countdownNum = 3;

// Day/night cycle
var dayNightTime = 0;
var DAY_CYCLE_SPEED = 0.015; // full cycle ~420s
var ambientLight, dirLight, hemiLight;
var skyColors = {
    day:   { sky: 0x5588cc, fog: 0x88aacc, ambient: 0x8899bb, dir: 0xffeedd, hemi: 0x88bbff, ground: 0x445566, exposure: 1.8 },
    dusk:  { sky: 0x331844, fog: 0x221133, ambient: 0x554466, dir: 0xff6633, hemi: 0x553366, ground: 0x221122, exposure: 1.2 },
    night: { sky: 0x020010, fog: 0x020010, ambient: 0x222244, dir: 0x4444aa, hemi: 0x111133, ground: 0x050510, exposure: 0.8 },
    dawn:  { sky: 0x443355, fog: 0x332244, ambient: 0x665577, dir: 0xffaa55, hemi: 0x554477, ground: 0x332233, exposure: 1.3 }
};
var clouds = [];

// Controls
var input = { left:false, right:false, gas:false, brake:false, nos:false };

// Audio
var audioCtx = null;
var engineOscA = null, engineOscB = null, engineGain = null;

// Particles
var exhaustParticles = [], tireParticles = [], sparkParticles = [], lightParticles = [];
var particlePool = { exhaust:[], tire:[], spark:[], light:[] };

// Environment
var buildings = [], trees = [];
var terrainZones = []; // different zones along the track

// DOM
var overlay = document.getElementById('overlay');
var menuMain = document.getElementById('menu-main');
var resultBox = document.getElementById('result-box');
var hudTop = document.getElementById('hud-top');
var hudPos = document.getElementById('hud-pos');
var hudLap = document.getElementById('hud-lap');
var speedo = document.getElementById('speedo');
var nosBar = document.getElementById('nos-bar');
var nosFill = document.getElementById('nos-fill');
var minimap = document.getElementById('minimap');
var minimapCtx = minimap.getContext('2d');

// ================================================================
//  INIT THREE.JS
// ================================================================
function initThree() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020010);
    scene.fog = new THREE.FogExp2(0x020010, 0.006);

    camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.5, 600);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.insertBefore(renderer.domElement, document.body.firstChild);
    renderer.domElement.id = 'game-canvas';

    clock = new THREE.Clock();

    // Lights
    ambientLight = new THREE.AmbientLight(0x222244, 0.6);
    scene.add(ambientLight);

    hemiLight = new THREE.HemisphereLight(0x88bbff, 0x111133, 0.3);
    scene.add(hemiLight);

    dirLight = new THREE.DirectionalLight(0x8888ff, 0.4);
    dirLight.position.set(50, 80, 50);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(1024, 1024);
    dirLight.shadow.camera.near = 1;
    dirLight.shadow.camera.far = 300;
    dirLight.shadow.camera.left = -100;
    dirLight.shadow.camera.right = 100;
    dirLight.shadow.camera.top = 100;
    dirLight.shadow.camera.bottom = -100;
    scene.add(dirLight);

    // Ground plane
    var groundGeo = new THREE.PlaneGeometry(2000, 2000);
    var groundMat = new THREE.MeshStandardMaterial({ color: 0x050510, roughness: 0.95 });
    var ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.1;
    ground.receiveShadow = true;
    scene.add(ground);
    // store ref for day/night color changes
    ground.userData.isGround = true;

    // Grid helper for neon feel
    var grid = new THREE.GridHelper(2000, 200, 0x1a0033, 0x0a0015);
    grid.position.y = -0.05;
    scene.add(grid);

    // Clouds
    createClouds();
    // Start at dawn
    dayNightTime = 0.75;

    window.addEventListener('resize', function() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
}

// ================================================================
//  CLOUDS
// ================================================================
function createClouds() {
    for (var i = 0; i < 25; i++) {
        var group = new THREE.Group();
        // Each cloud = cluster of spheres
        var numPuffs = 3 + Math.floor(Math.random() * 5);
        var cloudMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.35 });
        for (var p = 0; p < numPuffs; p++) {
            var r = 8 + Math.random() * 15;
            var puffGeo = new THREE.SphereGeometry(r, 7, 5);
            var puff = new THREE.Mesh(puffGeo, cloudMat.clone());
            puff.position.set((Math.random() - 0.5) * 30, (Math.random() - 0.5) * 5, (Math.random() - 0.5) * 15);
            puff.scale.y = 0.4 + Math.random() * 0.3;
            group.add(puff);
        }
        var angle = Math.random() * Math.PI * 2;
        var dist = 100 + Math.random() * 500;
        group.position.set(Math.cos(angle) * dist, 50 + Math.random() * 40, Math.sin(angle) * dist);
        group.userData.driftX = (Math.random() - 0.5) * 2;
        group.userData.driftZ = (Math.random() - 0.5) * 2;
        scene.add(group);
        clouds.push(group);
    }
}

function updateClouds(dt) {
    for (var i = 0; i < clouds.length; i++) {
        var c = clouds[i];
        c.position.x += c.userData.driftX * dt;
        c.position.z += c.userData.driftZ * dt;
        // Wrap around
        if (c.position.x > 600) c.position.x = -600;
        if (c.position.x < -600) c.position.x = 600;
        if (c.position.z > 600) c.position.z = -600;
        if (c.position.z < -600) c.position.z = 600;
    }
}

// ================================================================
//  DAY/NIGHT CYCLE
// ================================================================
function lerpColor(a, b, t) {
    var ca = new THREE.Color(a);
    var cb = new THREE.Color(b);
    return ca.lerp(cb, t);
}

function updateDayNight(dt) {
    dayNightTime = (dayNightTime + DAY_CYCLE_SPEED * dt) % 1;

    // 0-0.25 = day, 0.25-0.5 = dusk, 0.5-0.75 = night, 0.75-1.0 = dawn
    var phase, t;
    var fromKey, toKey;
    if (dayNightTime < 0.25) {
        fromKey = 'day'; toKey = 'day'; t = 0;
    } else if (dayNightTime < 0.35) {
        fromKey = 'day'; toKey = 'dusk'; t = (dayNightTime - 0.25) / 0.1;
    } else if (dayNightTime < 0.5) {
        fromKey = 'dusk'; toKey = 'night'; t = (dayNightTime - 0.35) / 0.15;
    } else if (dayNightTime < 0.75) {
        fromKey = 'night'; toKey = 'night'; t = 0;
    } else if (dayNightTime < 0.85) {
        fromKey = 'night'; toKey = 'dawn'; t = (dayNightTime - 0.75) / 0.1;
    } else {
        fromKey = 'dawn'; toKey = 'day'; t = (dayNightTime - 0.85) / 0.15;
    }

    var from = skyColors[fromKey];
    var to = skyColors[toKey];

    scene.background = lerpColor(from.sky, to.sky, t);
    scene.fog.color = lerpColor(from.fog, to.fog, t);
    ambientLight.color = lerpColor(from.ambient, to.ambient, t);
    dirLight.color = lerpColor(from.dir, to.dir, t);
    hemiLight.color = lerpColor(from.hemi, to.hemi, t);
    hemiLight.groundColor = lerpColor(from.ground, to.ground, t);

    var exposure = from.exposure + (to.exposure - from.exposure) * t;
    renderer.toneMappingExposure = exposure;

    // Sun position
    var sunAngle = dayNightTime * Math.PI * 2;
    dirLight.position.set(Math.cos(sunAngle) * 80, Math.sin(sunAngle) * 80 + 20, 50);
    dirLight.intensity = 0.2 + Math.max(0, Math.sin(sunAngle)) * 0.8;

    // Cloud opacity based on time of day
    var cloudOp = dayNightTime < 0.5 ? 0.15 + (0.25 - Math.abs(dayNightTime - 0.25)) * 1.0 : 0.08;
    for (var i = 0; i < clouds.length; i++) {
        var c = clouds[i];
        c.traverse(function(child) {
            if (child.material && child.material.opacity !== undefined) {
                child.material.opacity = Math.min(0.45, cloudOp);
                child.material.color = lerpColor(from.sky, 0xffffff, 0.7 + t * 0.3);
            }
        });
    }
}

// ================================================================
//  TRACK GENERATION
// ================================================================
function generateTrack() {
    // Create an interesting looping track shape
    trackPoints = [];
    var numCP = 12;
    for (var i = 0; i < numCP; i++) {
        var angle = (i / numCP) * Math.PI * 2;
        var r = TRACK_RADIUS + Math.sin(angle * 3) * 60 + Math.cos(angle * 2) * 40;
        var x = Math.cos(angle) * r;
        var z = Math.sin(angle) * r;
        trackPoints.push(new THREE.Vector3(x, 0, z));
    }

    trackCurve = new THREE.CatmullRomCurve3(trackPoints, true, 'catmullrom', 0.5);
    trackLength = trackCurve.getLength();

    // Build road mesh
    var roadShape = buildRoadMesh();
    scene.add(roadShape);

    // Build barriers and lane markings
    buildBarriers();
    buildLaneMarkings();

    // Terrain zones
    terrainZones = [
        { start: 0, end: 0.25, type: 'city', color: 0x0a0a20 },
        { start: 0.25, end: 0.5, type: 'industrial', color: 0x0a1005 },
        { start: 0.5, end: 0.75, type: 'highway', color: 0x080808 },
        { start: 0.75, end: 1.0, type: 'neon', color: 0x100520 }
    ];

    // Place buildings
    placeBuildings();

    // Place track-side lights
    placeTrackLights();
}

function buildRoadMesh() {
    var divisions = 500;
    var pts = trackCurve.getSpacedPoints(divisions);
    var geo = new THREE.BufferGeometry();
    var verts = [], uvs = [], indices = [];
    var halfW = ROAD_WIDTH / 2;

    for (var i = 0; i <= divisions; i++) {
        var t = i / divisions;
        var pt = trackCurve.getPointAt(t);
        var tan = trackCurve.getTangentAt(t).normalize();
        var right = new THREE.Vector3(-tan.z, 0, tan.x);

        var l = pt.clone().addScaledVector(right, -halfW);
        var r = pt.clone().addScaledVector(right, halfW);

        verts.push(l.x, 0.01, l.z, r.x, 0.01, r.z);
        uvs.push(0, t * 50, 1, t * 50);

        if (i < divisions) {
            var a = i * 2, b = i * 2 + 1, c = (i + 1) * 2, d = (i + 1) * 2 + 1;
            indices.push(a, c, b, b, c, d);
        }
    }

    geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
    geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
    geo.setIndex(indices);
    geo.computeVertexNormals();

    // Road texture - dark asphalt with slight detail
    var roadMat = new THREE.MeshStandardMaterial({
        color: 0x1a1a2e,
        roughness: 0.7,
        metalness: 0.1
    });

    var mesh = new THREE.Mesh(geo, roadMat);
    mesh.receiveShadow = true;
    return mesh;
}

function buildBarriers() {
    var divisions = 200;
    var halfW = ROAD_WIDTH / 2 + 0.8;

    for (var side = -1; side <= 1; side += 2) {
        var geo = new THREE.BufferGeometry();
        var verts = [], indices = [];

        for (var i = 0; i <= divisions; i++) {
            var t = i / divisions;
            var pt = trackCurve.getPointAt(t);
            var tan = trackCurve.getTangentAt(t).normalize();
            var right = new THREE.Vector3(-tan.z, 0, tan.x);
            var pos = pt.clone().addScaledVector(right, side * halfW);

            verts.push(pos.x, 0, pos.z);
            verts.push(pos.x, 0.6, pos.z);

            if (i < divisions) {
                var a = i * 2, b = i * 2 + 1, c = (i + 1) * 2, d = (i + 1) * 2 + 1;
                if (side > 0) { indices.push(a, b, c, b, d, c); }
                else { indices.push(a, c, b, b, c, d); }
            }
        }

        geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
        geo.setIndex(indices);
        geo.computeVertexNormals();

        var mat = new THREE.MeshStandardMaterial({
            color: 0x8a2be2,
            emissive: 0x3a0b72,
            emissiveIntensity: 0.5,
            roughness: 0.5
        });
        var mesh = new THREE.Mesh(geo, mat);
        scene.add(mesh);
    }
}

function buildLaneMarkings() {
    var divisions = 400;
    var markGeo = new THREE.BufferGeometry();
    var verts = [], indices = [];
    var idx = 0;

    for (var lane = 1; lane < NUM_LANES; lane++) {
        var offset = -ROAD_WIDTH / 2 + lane * LANE_W;
        for (var i = 0; i < divisions; i++) {
            if (i % 4 < 2) continue; // dashed
            var t0 = i / divisions;
            var t1 = (i + 1) / divisions;
            var p0 = trackCurve.getPointAt(t0);
            var p1 = trackCurve.getPointAt(t1);
            var tan0 = trackCurve.getTangentAt(t0).normalize();
            var tan1 = trackCurve.getTangentAt(t1).normalize();
            var r0 = new THREE.Vector3(-tan0.z, 0, tan0.x);
            var r1 = new THREE.Vector3(-tan1.z, 0, tan1.x);
            var hw = 0.08;

            var a0 = p0.clone().addScaledVector(r0, offset - hw);
            var b0 = p0.clone().addScaledVector(r0, offset + hw);
            var a1 = p1.clone().addScaledVector(r1, offset - hw);
            var b1 = p1.clone().addScaledVector(r1, offset + hw);

            verts.push(a0.x, 0.02, a0.z);
            verts.push(b0.x, 0.02, b0.z);
            verts.push(a1.x, 0.02, a1.z);
            verts.push(b1.x, 0.02, b1.z);
            indices.push(idx, idx+2, idx+1, idx+1, idx+2, idx+3);
            idx += 4;
        }
    }

    if (verts.length === 0) return;
    markGeo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
    markGeo.setIndex(indices);

    var markMat = new THREE.MeshBasicMaterial({ color: 0x4444ff });
    scene.add(new THREE.Mesh(markGeo, markMat));

    // Start/finish line
    var t = 0;
    var pt = trackCurve.getPointAt(t);
    var tan = trackCurve.getTangentAt(t).normalize();
    var right = new THREE.Vector3(-tan.z, 0, tan.x);
    var slGeo = new THREE.PlaneGeometry(ROAD_WIDTH, 2);
    var slMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
    var sl = new THREE.Mesh(slGeo, slMat);
    sl.rotation.x = -Math.PI / 2;
    sl.position.copy(pt);
    sl.position.y = 0.03;
    sl.lookAt(pt.clone().add(tan));
    sl.rotation.x = -Math.PI / 2;
    // Align to road direction
    var angle = Math.atan2(tan.x, tan.z);
    sl.rotation.z = -angle;
    scene.add(sl);
}

function addWindowGrid(bx, by, bz, bw, bh, bd, zone) {
    // Add lit window grids on each visible face
    var wColors = zone === 'neon' ? [0x8a2be2, 0xff00ff, 0x4444ff] :
                  zone === 'city' ? [0xffdd88, 0x88bbff, 0x334455] :
                  [0xffcc66, 0x556688, 0x333344];

    var faces = [
        { axis: 'x', dir: 1, w: bd, h: bh, px: bx + bw * 0.501, py: by, pz: bz, ry: Math.PI / 2 },
        { axis: 'x', dir: -1, w: bd, h: bh, px: bx - bw * 0.501, py: by, pz: bz, ry: -Math.PI / 2 },
        { axis: 'z', dir: 1, w: bw, h: bh, px: bx, py: by, pz: bz + bd * 0.501, ry: 0 },
        { axis: 'z', dir: -1, w: bw, h: bh, px: bx, py: by, pz: bz - bd * 0.501, ry: Math.PI }
    ];

    for (var f = 0; f < faces.length; f++) {
        var face = faces[f];
        var cols = Math.max(1, Math.floor(face.w / 1.2));
        var rows = Math.max(1, Math.floor(face.h / 1.5));
        var winW = face.w * 0.7 / cols;
        var winH = face.h * 0.6 / rows;

        for (var r = 0; r < rows; r++) {
            for (var c = 0; c < cols; c++) {
                if (Math.random() < 0.3) continue; // some windows dark
                var wGeo = new THREE.PlaneGeometry(winW * 0.7, winH * 0.6);
                var wColor = wColors[Math.floor(Math.random() * wColors.length)];
                var wMat = new THREE.MeshBasicMaterial({
                    color: wColor,
                    transparent: true,
                    opacity: 0.3 + Math.random() * 0.5
                });
                var wMesh = new THREE.Mesh(wGeo, wMat);

                var offX = (c - (cols - 1) / 2) * (face.w * 0.8 / cols);
                var offY = (r - (rows - 1) / 2) * (face.h * 0.7 / rows);

                wMesh.position.set(face.px, face.py + offY, face.pz);
                wMesh.rotation.y = face.ry;

                // Shift along face's local axis
                if (face.axis === 'x') {
                    wMesh.position.z += offX;
                } else {
                    wMesh.position.x += offX;
                }

                scene.add(wMesh);
            }
        }
    }
}

function placeBuildings() {
    var numBuildings = 80;
    for (var i = 0; i < numBuildings; i++) {
        var t = i / numBuildings;
        var pt = trackCurve.getPointAt(t);
        var tan = trackCurve.getTangentAt(t).normalize();
        var right = new THREE.Vector3(-tan.z, 0, tan.x);
        var side = (i % 2 === 0) ? 1 : -1;
        var dist = ROAD_WIDTH / 2 + 6 + Math.random() * 20;

        var bw = 3 + Math.random() * 6;
        var bh = 4 + Math.random() * 20;
        var bd = 3 + Math.random() * 6;

        var geo = new THREE.BoxGeometry(bw, bh, bd);
        var zone = getTerrainZone(t);
        var emColor = zone === 'neon' ? 0x8a2be2 : zone === 'city' ? 0x222266 : 0x111122;
        var mat = new THREE.MeshStandardMaterial({
            color: 0x0a0a15,
            emissive: emColor,
            emissiveIntensity: 0.3,
            roughness: 0.8
        });

        var mesh = new THREE.Mesh(geo, mat);
        var pos = pt.clone().addScaledVector(right, side * dist);
        mesh.position.set(pos.x, bh / 2, pos.z);
        mesh.castShadow = true;
        scene.add(mesh);
        buildings.push(mesh);

        // Window grids on all faces
        if (bh > 5) {
            addWindowGrid(pos.x, bh / 2, pos.z, bw, bh, bd, zone);
        }

        // Rooftop accent light for taller buildings
        if (bh > 12) {
            var roofLight = new THREE.Mesh(
                new THREE.BoxGeometry(bw * 0.3, 0.2, bd * 0.3),
                new THREE.MeshBasicMaterial({ color: emColor })
            );
            roofLight.position.set(pos.x, bh + 0.1, pos.z);
            scene.add(roofLight);
        }
    }
}

function placeTrackLights() {
    var numLights = 40;
    for (var i = 0; i < numLights; i++) {
        var t = i / numLights;
        var pt = trackCurve.getPointAt(t);
        var tan = trackCurve.getTangentAt(t).normalize();
        var right = new THREE.Vector3(-tan.z, 0, tan.x);
        var side = (i % 2 === 0) ? 1 : -1;
        var dist = ROAD_WIDTH / 2 + 1.5;

        // Pole
        var poleGeo = new THREE.CylinderGeometry(0.08, 0.08, 4, 6);
        var poleMat = new THREE.MeshStandardMaterial({ color: 0x333344 });
        var pole = new THREE.Mesh(poleGeo, poleMat);
        var pos = pt.clone().addScaledVector(right, side * dist);
        pole.position.set(pos.x, 2, pos.z);
        scene.add(pole);

        // Light sphere
        var zone = getTerrainZone(t);
        var lColor = zone === 'neon' ? 0xff00ff : zone === 'city' ? 0x4444ff : 0x8a2be2;
        var sphereGeo = new THREE.SphereGeometry(0.2, 8, 8);
        var sphereMat = new THREE.MeshBasicMaterial({ color: lColor });
        var sphere = new THREE.Mesh(sphereGeo, sphereMat);
        sphere.position.set(pos.x, 4.1, pos.z);
        scene.add(sphere);

        // Point light (sparse to save performance)
        if (i % 4 === 0) {
            var pLight = new THREE.PointLight(lColor, 2, 15);
            pLight.position.set(pos.x, 4, pos.z);
            scene.add(pLight);
        }
    }
}

function getTerrainZone(t) {
    for (var i = 0; i < terrainZones.length; i++) {
        if (t >= terrainZones[i].start && t < terrainZones[i].end) return terrainZones[i].type;
    }
    return 'city';
}

// ================================================================
//  HIGH-POLY CAR BUILDER
// ================================================================
function buildCar(color, isPlayer) {
    var group = new THREE.Group();
    var bLen = 2.6, bWid = 1.1;

    var bodyMat = new THREE.MeshStandardMaterial({
        color: color, metalness: 0.75, roughness: 0.15,
        emissive: color, emissiveIntensity: 0.12
    });
    var darkMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5, metalness: 0.3 });
    var chromeMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.95, roughness: 0.05 });
    var glassMat = new THREE.MeshStandardMaterial({
        color: 0x112244, metalness: 0.9, roughness: 0.05, transparent: true, opacity: 0.65
    });

    // --- Lower body (rounded) ---
    var lowerShape = new THREE.Shape();
    var hw = bWid / 2, hl = bLen / 2;
    lowerShape.moveTo(-hw + 0.15, -hl);
    lowerShape.lineTo(hw - 0.15, -hl);
    lowerShape.quadraticCurveTo(hw, -hl, hw, -hl + 0.15);
    lowerShape.lineTo(hw, hl - 0.2);
    lowerShape.quadraticCurveTo(hw, hl, hw - 0.2, hl);
    lowerShape.lineTo(-hw + 0.2, hl);
    lowerShape.quadraticCurveTo(-hw, hl, -hw, hl - 0.2);
    lowerShape.lineTo(-hw, -hl + 0.15);
    lowerShape.quadraticCurveTo(-hw, -hl, -hw + 0.15, -hl);

    var extrudeSettings = { depth: 0.35, bevelEnabled: true, bevelThickness: 0.03, bevelSize: 0.03, bevelSegments: 3 };
    var lowerGeo = new THREE.ExtrudeGeometry(lowerShape, extrudeSettings);
    lowerGeo.rotateX(-Math.PI / 2);
    var lower = new THREE.Mesh(lowerGeo, bodyMat);
    lower.position.y = 0.18;
    lower.castShadow = true;
    group.add(lower);

    // --- Upper body / cabin (tapered) ---
    var cabShape = new THREE.Shape();
    var cw = bWid * 0.42, cl = bLen * 0.22;
    cabShape.moveTo(-cw, -cl);
    cabShape.lineTo(cw, -cl);
    cabShape.lineTo(cw * 0.85, cl);
    cabShape.lineTo(-cw * 0.85, cl);
    cabShape.closePath();
    var cabExtrude = { depth: 0.32, bevelEnabled: true, bevelThickness: 0.02, bevelSize: 0.04, bevelSegments: 3 };
    var cabGeo = new THREE.ExtrudeGeometry(cabShape, cabExtrude);
    cabGeo.rotateX(-Math.PI / 2);
    var cabin = new THREE.Mesh(cabGeo, bodyMat);
    cabin.position.set(0, 0.53, -bLen * 0.04);
    cabin.castShadow = true;
    group.add(cabin);

    // --- Front hood (curved) ---
    var hoodGeo = new THREE.BoxGeometry(bWid * 0.9, 0.06, bLen * 0.28);
    var hood = new THREE.Mesh(hoodGeo, bodyMat);
    hood.position.set(0, 0.52, bLen * 0.28);
    group.add(hood);

    // --- Front splitter ---
    var splitGeo = new THREE.BoxGeometry(bWid * 1.05, 0.03, 0.15);
    var splitter = new THREE.Mesh(splitGeo, darkMat);
    splitter.position.set(0, 0.17, bLen * 0.5);
    group.add(splitter);

    // --- Rear diffuser ---
    var diffGeo = new THREE.BoxGeometry(bWid * 0.95, 0.08, 0.2);
    var diffuser = new THREE.Mesh(diffGeo, darkMat);
    diffuser.position.set(0, 0.18, -bLen * 0.48);
    group.add(diffuser);
    // Diffuser fins
    for (var df = -2; df <= 2; df++) {
        var finGeo = new THREE.BoxGeometry(0.02, 0.06, 0.18);
        var fin = new THREE.Mesh(finGeo, darkMat);
        fin.position.set(df * 0.12, 0.19, -bLen * 0.48);
        group.add(fin);
    }

    // --- Side skirts ---
    for (var sk = -1; sk <= 1; sk += 2) {
        var skirtGeo = new THREE.BoxGeometry(0.06, 0.1, bLen * 0.7);
        var skirt = new THREE.Mesh(skirtGeo, darkMat);
        skirt.position.set(sk * bWid * 0.52, 0.17, 0);
        group.add(skirt);
    }

    // --- Fenders (wheel arches) ---
    var fenderGeo = new THREE.TorusGeometry(0.22, 0.04, 6, 10, Math.PI);
    var fenderPositions = [
        [-bWid * 0.5, 0.2, bLen * 0.32],
        [bWid * 0.5, 0.2, bLen * 0.32],
        [-bWid * 0.5, 0.2, -bLen * 0.32],
        [bWid * 0.5, 0.2, -bLen * 0.32]
    ];
    for (var fi = 0; fi < fenderPositions.length; fi++) {
        var fender = new THREE.Mesh(fenderGeo, bodyMat);
        fender.position.set(fenderPositions[fi][0], fenderPositions[fi][1], fenderPositions[fi][2]);
        fender.rotation.y = (fi % 2 === 0) ? -Math.PI / 2 : Math.PI / 2;
        fender.rotation.z = Math.PI;
        group.add(fender);
    }

    // --- Windshield (angled) ---
    var wsGeo = new THREE.PlaneGeometry(bWid * 0.72, 0.3);
    var ws = new THREE.Mesh(wsGeo, glassMat);
    ws.position.set(0, 0.7, bLen * 0.12);
    ws.rotation.x = 0.35;
    group.add(ws);

    // Side windows
    for (var sw = -1; sw <= 1; sw += 2) {
        var swGeo = new THREE.PlaneGeometry(bLen * 0.2, 0.22);
        var swMesh = new THREE.Mesh(swGeo, glassMat);
        swMesh.position.set(sw * bWid * 0.43, 0.68, -bLen * 0.04);
        swMesh.rotation.y = sw * Math.PI / 2;
        group.add(swMesh);
    }

    // Rear window
    var rwGeo = new THREE.PlaneGeometry(bWid * 0.65, 0.22);
    var rw = new THREE.Mesh(rwGeo, glassMat);
    rw.position.set(0, 0.68, -bLen * 0.18);
    rw.rotation.x = -0.25;
    rw.rotation.y = Math.PI;
    group.add(rw);

    // --- Hood scoop ---
    var scoopGeo = new THREE.BoxGeometry(0.22, 0.1, 0.25);
    var scoop = new THREE.Mesh(scoopGeo, darkMat);
    scoop.position.set(0, 0.57, bLen * 0.3);
    group.add(scoop);

    // --- Roof fin / antenna ---
    var antGeo = new THREE.BoxGeometry(0.03, 0.12, 0.08);
    var ant = new THREE.Mesh(antGeo, darkMat);
    ant.position.set(0, 0.88, -bLen * 0.08);
    group.add(ant);

    // --- Spoiler (GT wing) ---
    var spoilerGeo = new THREE.BoxGeometry(bWid * 1.0, 0.04, 0.18);
    var spoiler = new THREE.Mesh(spoilerGeo, darkMat);
    spoiler.position.set(0, 0.88, -bLen * 0.42);
    group.add(spoiler);
    // Spoiler endplates
    for (var sp = -1; sp <= 1; sp += 2) {
        var epGeo = new THREE.BoxGeometry(0.03, 0.12, 0.22);
        var ep = new THREE.Mesh(epGeo, darkMat);
        ep.position.set(sp * bWid * 0.5, 0.84, -bLen * 0.42);
        group.add(ep);
    }
    // Spoiler supports (swan neck)
    for (var ss = -1; ss <= 1; ss += 2) {
        var supGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.2, 6);
        var sup = new THREE.Mesh(supGeo, chromeMat);
        sup.position.set(ss * bWid * 0.3, 0.78, -bLen * 0.42);
        group.add(sup);
    }

    // --- Headlights (complex) ---
    for (var hl = -1; hl <= 1; hl += 2) {
        // Housing
        var hlHousingGeo = new THREE.BoxGeometry(0.22, 0.1, 0.08);
        var hlHousing = new THREE.Mesh(hlHousingGeo, darkMat);
        hlHousing.position.set(hl * bWid * 0.33, 0.4, bLen * 0.5);
        group.add(hlHousing);
        // Bulb
        var hlGeo = new THREE.SphereGeometry(0.06, 10, 10);
        var hlMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        var hlMesh = new THREE.Mesh(hlGeo, hlMat);
        hlMesh.position.set(hl * bWid * 0.33, 0.4, bLen * 0.51);
        group.add(hlMesh);
        // DRL strip
        var drlGeo = new THREE.BoxGeometry(0.18, 0.02, 0.02);
        var drlMat = new THREE.MeshBasicMaterial({ color: 0xccddff });
        var drl = new THREE.Mesh(drlGeo, drlMat);
        drl.position.set(hl * bWid * 0.33, 0.36, bLen * 0.51);
        group.add(drl);

        if (isPlayer) {
            var hlLight = new THREE.SpotLight(0xffffff, 2.5, 35, 0.35, 0.5);
            hlLight.position.set(hl * bWid * 0.33, 0.4, bLen * 0.5);
            hlLight.target.position.set(hl * bWid * 0.15, 0, bLen * 0.5 + 12);
            group.add(hlLight);
            group.add(hlLight.target);
        }
    }

    // --- Tail lights (LED strip style) ---
    group.userData.tailLights = [];
    for (var tl = -1; tl <= 1; tl += 2) {
        var tlGeo = new THREE.BoxGeometry(0.2, 0.04, 0.03);
        var tlMat = new THREE.MeshBasicMaterial({ color: 0xff0022 });
        var tlMesh = new THREE.Mesh(tlGeo, tlMat);
        tlMesh.position.set(tl * bWid * 0.3, 0.4, -bLen * 0.5);
        group.add(tlMesh);
        group.userData.tailLights.push(tlMesh);
        // Lower accent
        var tlAccent = new THREE.Mesh(
            new THREE.BoxGeometry(0.15, 0.02, 0.03),
            new THREE.MeshBasicMaterial({ color: 0xff4400 })
        );
        tlAccent.position.set(tl * bWid * 0.3, 0.36, -bLen * 0.5);
        group.add(tlAccent);
    }
    // Center tail light strip
    var ctlGeo = new THREE.BoxGeometry(bWid * 0.3, 0.02, 0.02);
    var ctlMat = new THREE.MeshBasicMaterial({ color: 0xff0022 });
    var ctl = new THREE.Mesh(ctlGeo, ctlMat);
    ctl.position.set(0, 0.4, -bLen * 0.5);
    group.add(ctl);

    // --- Side mirrors ---
    for (var sm = -1; sm <= 1; sm += 2) {
        // Arm
        var armGeo = new THREE.BoxGeometry(0.14, 0.03, 0.03);
        var arm = new THREE.Mesh(armGeo, darkMat);
        arm.position.set(sm * (bWid * 0.53), 0.57, bLen * 0.08);
        group.add(arm);
        // Mirror head
        var mirGeo = new THREE.BoxGeometry(0.08, 0.06, 0.06);
        var mir = new THREE.Mesh(mirGeo, chromeMat);
        mir.position.set(sm * (bWid * 0.59), 0.57, bLen * 0.08);
        group.add(mir);
    }

    // --- Wheels (high-poly with brake discs) ---
    var tireGeo = new THREE.TorusGeometry(0.18, 0.07, 10, 20);
    var tireMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.85 });
    var rimGeo = new THREE.CylinderGeometry(0.14, 0.14, 0.1, 12);
    var rimMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.95, roughness: 0.05 });
    var brakeGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.04, 10);
    var brakeMat = new THREE.MeshStandardMaterial({ color: 0x993333, metalness: 0.3 });

    var wheelPositions = [
        [-bWid * 0.52, 0.18, bLen * 0.34],
        [bWid * 0.52, 0.18, bLen * 0.34],
        [-bWid * 0.52, 0.18, -bLen * 0.34],
        [bWid * 0.52, 0.18, -bLen * 0.34]
    ];

    group.userData.wheels = [];
    for (var wi = 0; wi < wheelPositions.length; wi++) {
        var wheelGroup = new THREE.Group();
        // Tire
        var tire = new THREE.Mesh(tireGeo, tireMat);
        tire.rotation.y = Math.PI / 2;
        wheelGroup.add(tire);
        // Rim
        var rim = new THREE.Mesh(rimGeo, rimMat);
        rim.rotation.z = Math.PI / 2;
        wheelGroup.add(rim);
        // Brake disc
        var brake = new THREE.Mesh(brakeGeo, brakeMat);
        brake.rotation.z = Math.PI / 2;
        wheelGroup.add(brake);
        // Spoke detail
        for (var sp2 = 0; sp2 < 5; sp2++) {
            var spokeGeo = new THREE.BoxGeometry(0.13, 0.02, 0.015);
            var spoke = new THREE.Mesh(spokeGeo, rimMat);
            spoke.rotation.z = (sp2 / 5) * Math.PI;
            wheelGroup.add(spoke);
        }

        wheelGroup.position.set(wheelPositions[wi][0], wheelPositions[wi][1], wheelPositions[wi][2]);
        wheelGroup.castShadow = true;
        group.add(wheelGroup);
        group.userData.wheels.push(wheelGroup);
    }

    // --- Exhaust tips (chrome) ---
    for (var ex = -1; ex <= 1; ex += 2) {
        var exGeo = new THREE.CylinderGeometry(0.035, 0.05, 0.18, 10);
        var exMesh = new THREE.Mesh(exGeo, chromeMat);
        exMesh.rotation.x = Math.PI / 2;
        exMesh.position.set(ex * 0.22, 0.2, -bLen * 0.54);
        group.add(exMesh);
    }

    // --- Underbody neon glow ---
    var underGeo = new THREE.PlaneGeometry(bWid * 0.85, bLen * 0.85);
    var underMat = new THREE.MeshBasicMaterial({
        color: color, transparent: true, opacity: 0.2, side: THREE.DoubleSide
    });
    var under = new THREE.Mesh(underGeo, underMat);
    under.rotation.x = -Math.PI / 2;
    under.position.y = 0.03;
    group.add(under);

    // Car data
    group.userData.trackT = 0;
    group.userData.laneOffset = 0;
    group.userData.speed = 0;
    group.userData.maxSpeed = 45;
    group.userData.acceleration = 18;
    group.userData.brakeForce = 30;
    group.userData.currentLane = 1;
    group.userData.targetLaneOffset = 0;
    group.userData.nos = MAX_NOS;
    group.userData.nosActive = false;
    group.userData.lap = 0;
    group.userData.lastCheckT = 0;
    group.userData.finished = false;
    group.userData.finishTime = 0;
    group.userData.totalDist = 0;
    group.userData.velY = 0;
    group.userData.onGround = true;
    group.userData.collisionCooldown = 0;
    group.userData.color = color;
    group.userData.steerAngle = 0;

    scene.add(group);
    return group;
}

function spawnCars() {
    // Player
    playerCar = buildCar(CAR_COLORS[0], true);
    playerCar.userData.trackT = 0.0;
    playerCar.userData.laneOffset = 0;
    playerCar.userData.currentLane = 1;

    // AI
    aiCars = [];
    for (var i = 0; i < NUM_AI; i++) {
        var car = buildCar(AI_COLORS[i % AI_COLORS.length], false);
        car.userData.trackT = 0.0;
        car.userData.laneOffset = ((i % NUM_LANES) - 1.5) * LANE_W;
        car.userData.currentLane = i % NUM_LANES;
        car.userData.targetLaneOffset = car.userData.laneOffset;
        car.userData.aiSkill = 0.7 + Math.random() * 0.3;
        car.userData.aiAggression = 0.3 + Math.random() * 0.5;
        car.userData.maxSpeed = 32 + Math.random() * 16;
        aiCars.push(car);
    }

    // Stagger starting positions
    for (var j = 0; j < aiCars.length; j++) {
        aiCars[j].userData.trackT = -((j + 1) * 0.004);
        if (aiCars[j].userData.trackT < 0) aiCars[j].userData.trackT += 1;
    }
}

// ================================================================
//  AUDIO
// ================================================================
function initAudio() {
    if (audioCtx) return;
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) { return; }
}

function startEngineSound() {
    if (!audioCtx) return;
    try {
        engineOscA = audioCtx.createOscillator();
        engineOscB = audioCtx.createOscillator();
        engineGain = audioCtx.createGain();
        engineOscA.type = 'sawtooth';
        engineOscB.type = 'square';
        engineOscA.frequency.value = 80;
        engineOscB.frequency.value = 40;
        engineGain.gain.value = 0.04;
        engineOscA.connect(engineGain);
        engineOscB.connect(engineGain);
        engineGain.connect(audioCtx.destination);
        engineOscA.start();
        engineOscB.start();
    } catch(e) {}
}

function updateEngineSound(spd, maxSpd, nosActive) {
    if (!engineOscA || !audioCtx) return;
    try {
        var t = Math.min(spd / maxSpd, 1);
        var baseFreq = 60 + t * 160;
        if (nosActive) baseFreq += 40;
        engineOscA.frequency.setTargetAtTime(baseFreq, audioCtx.currentTime, 0.05);
        engineOscB.frequency.setTargetAtTime(baseFreq * 0.5, audioCtx.currentTime, 0.05);
        engineGain.gain.setTargetAtTime(0.02 + t * 0.05, audioCtx.currentTime, 0.05);
    } catch(e) {}
}

function stopEngineSound() {
    try {
        if (engineOscA) { engineOscA.stop(); engineOscA = null; }
        if (engineOscB) { engineOscB.stop(); engineOscB = null; }
    } catch(e) {}
}

function playSound(freq, dur, type, vol) {
    if (!audioCtx) return;
    try {
        var o = audioCtx.createOscillator();
        var g = audioCtx.createGain();
        o.type = type || 'sine';
        o.frequency.value = freq;
        g.gain.value = vol || 0.1;
        o.connect(g).connect(audioCtx.destination);
        o.start();
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
        o.stop(audioCtx.currentTime + dur + 0.01);
    } catch(e) {}
}

function playCrashSound() {
    if (!audioCtx) return;
    try {
        var len = Math.floor(audioCtx.sampleRate * 0.25);
        var buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
        var d = buf.getChannelData(0);
        for (var i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2);
        var s = audioCtx.createBufferSource(); s.buffer = buf;
        var g = audioCtx.createGain(); g.gain.value = 0.3;
        s.connect(g).connect(audioCtx.destination); s.start();
    } catch(e) {}
}

function playNosSound() {
    playSound(200, 0.3, 'sawtooth', 0.08);
    playSound(150, 0.5, 'square', 0.05);
}

var particleMeshes = { exhaust: [], tire: [], spark: [], nosFlame: [] };

function initParticlePool() {
    // Exhaust smoke
    var smokeGeo = new THREE.SphereGeometry(0.06, 4, 4);
    for (var i = 0; i < 60; i++) {
        var mat = new THREE.MeshBasicMaterial({ color: 0x888888, transparent: true, opacity: 0 });
        var m = new THREE.Mesh(smokeGeo, mat);
        m.visible = false;
        scene.add(m);
        particleMeshes.exhaust.push({ mesh: m, life: 0, maxLife: 0, vx: 0, vy: 0, vz: 0 });
    }

    // Tire smoke
    var tireGeo = new THREE.SphereGeometry(0.08, 4, 4);
    for (var j = 0; j < 80; j++) {
        var tMat = new THREE.MeshBasicMaterial({ color: 0xaaaaaa, transparent: true, opacity: 0 });
        var tM = new THREE.Mesh(tireGeo, tMat);
        tM.visible = false;
        scene.add(tM);
        particleMeshes.tire.push({ mesh: tM, life: 0, maxLife: 0, vx: 0, vy: 0, vz: 0 });
    }

    // Sparks
    var sparkGeo = new THREE.BoxGeometry(0.03, 0.03, 0.12);
    for (var k = 0; k < 50; k++) {
        var sMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0 });
        var sM = new THREE.Mesh(sparkGeo, sMat);
        sM.visible = false;
        scene.add(sM);
        particleMeshes.spark.push({ mesh: sM, life: 0, maxLife: 0, vx: 0, vy: 0, vz: 0 });
    }

    // NOS flame
    var flameGeo = new THREE.ConeGeometry(0.08, 0.3, 6);
    for (var n = 0; n < 20; n++) {
        var nMat = new THREE.MeshBasicMaterial({ color: 0x00aaff, transparent: true, opacity: 0 });
        var nM = new THREE.Mesh(flameGeo, nMat);
        nM.visible = false;
        scene.add(nM);
        particleMeshes.nosFlame.push({ mesh: nM, life: 0, maxLife: 0, vx: 0, vy: 0, vz: 0 });
    }
}

function spawnParticle(type, x, y, z, vx, vy, vz, life, color) {
    var pool = particleMeshes[type];
    if (!pool) return;
    for (var i = 0; i < pool.length; i++) {
        if (pool[i].life <= 0) {
            var p = pool[i];
            p.mesh.position.set(x, y, z);
            p.mesh.visible = true;
            p.mesh.material.opacity = 1;
            if (color !== undefined) p.mesh.material.color.setHex(color);
            p.life = life;
            p.maxLife = life;
            p.vx = vx; p.vy = vy; p.vz = vz;
            return;
        }
    }
}

function updateParticles(dt) {
    var types = ['exhaust', 'tire', 'spark', 'nosFlame'];
    for (var t = 0; t < types.length; t++) {
        var pool = particleMeshes[types[t]];
        for (var i = 0; i < pool.length; i++) {
            var p = pool[i];
            if (p.life > 0) {
                p.life -= dt;
                var frac = Math.max(0, p.life / p.maxLife);
                p.mesh.material.opacity = frac;
                p.mesh.position.x += p.vx * dt;
                p.mesh.position.y += p.vy * dt;
                p.mesh.position.z += p.vz * dt;
                if (types[t] === 'exhaust' || types[t] === 'tire') {
                    p.mesh.scale.setScalar(1 + (1 - frac) * 2);
                    p.vy += dt * 0.5;
                }
                if (types[t] === 'spark') {
                    p.vy -= dt * 15;
                }
                if (p.life <= 0) {
                    p.mesh.visible = false;
                }
            }
        }
    }
}

function emitExhaust(car) {
    var pos = car.position.clone();
    var dir = new THREE.Vector3(0, 0, -1).applyQuaternion(car.quaternion);
    var ePos = pos.clone().addScaledVector(dir, 1.3);
    ePos.y += 0.2;
    for (var i = -1; i <= 1; i += 2) {
        var right = new THREE.Vector3(-dir.z, 0, dir.x);
        var ep = ePos.clone().addScaledVector(right, i * 0.2);
        spawnParticle('exhaust', ep.x, ep.y, ep.z,
            dir.x * -2 + (Math.random() - 0.5),
            0.5 + Math.random(),
            dir.z * -2 + (Math.random() - 0.5),
            0.5 + Math.random() * 0.5, 0x555555);
    }
}

function emitTireSmoke(car) {
    var pos = car.position.clone();
    var dir = new THREE.Vector3(0, 0, -1).applyQuaternion(car.quaternion);
    var right = new THREE.Vector3(-dir.z, 0, dir.x);
    // Rear wheels
    for (var i = -1; i <= 1; i += 2) {
        var wp = pos.clone().addScaledVector(dir, 0.8).addScaledVector(right, i * 0.5);
        wp.y = 0.1;
        spawnParticle('tire', wp.x, wp.y, wp.z,
            (Math.random() - 0.5) * 2, 0.3 + Math.random(), (Math.random() - 0.5) * 2,
            0.6 + Math.random() * 0.4, 0xcccccc);
    }
}

function emitSparks(x, y, z) {
    for (var i = 0; i < 8; i++) {
        spawnParticle('spark', x, y + 0.3, z,
            (Math.random() - 0.5) * 10, 3 + Math.random() * 5, (Math.random() - 0.5) * 10,
            0.3 + Math.random() * 0.3, 0xffaa00);
    }
}

function emitNosFlame(car) {
    var pos = car.position.clone();
    var dir = new THREE.Vector3(0, 0, -1).applyQuaternion(car.quaternion);
    var ePos = pos.clone().addScaledVector(dir, 1.4);
    ePos.y += 0.2;
    for (var i = -1; i <= 1; i += 2) {
        var right = new THREE.Vector3(-dir.z, 0, dir.x);
        var ep = ePos.clone().addScaledVector(right, i * 0.2);
        spawnParticle('nosFlame', ep.x, ep.y, ep.z,
            dir.x * -6 + (Math.random() - 0.5) * 2,
            (Math.random() - 0.5) * 2,
            dir.z * -6 + (Math.random() - 0.5) * 2,
            0.2 + Math.random() * 0.2,
            Math.random() < 0.5 ? 0x00aaff : 0x0066ff);
    }
}

// ================================================================
//  CAR PHYSICS & UPDATE
// ================================================================
function updateCar(car, dt, isPlayer) {
    var ud = car.userData;
    if (ud.finished) {
        ud.speed *= 0.98;
        if (ud.speed < 1) ud.speed = 0;
    }

    // Get position on track
    var t = ud.trackT;
    if (t < 0) t += 1;
    if (t >= 1) t -= 1;
    ud.trackT = t;

    var pt = trackCurve.getPointAt(t);
    var tan = trackCurve.getTangentAt(t).normalize();
    var right = new THREE.Vector3(-tan.z, 0, tan.x);

    // Position
    var targetPos = pt.clone().addScaledVector(right, ud.laneOffset);
    targetPos.y = Math.max(0, car.position.y);

    car.position.copy(targetPos);

    // Rotation to face direction
    var lookTarget = pt.clone().add(tan.clone().multiplyScalar(5));
    lookTarget.addScaledVector(right, ud.laneOffset);
    lookTarget.y = car.position.y;
    car.lookAt(lookTarget);

    // Wheel spin
    if (ud.wheels) {
        var wheelSpin = ud.speed * dt * 8;
        for (var w = 0; w < ud.wheels.length; w++) {
            ud.wheels[w].rotation.x += wheelSpin;
        }
    }

    // Brake lights
    if (ud.tailLights) {
        var braking = isPlayer ? input.brake : false;
        for (var tl = 0; tl < ud.tailLights.length; tl++) {
            ud.tailLights[tl].material.color.setHex(braking ? 0xff0000 : 0xff0022);
            ud.tailLights[tl].scale.setScalar(braking ? 1.5 : 1);
        }
    }

    // Move along track
    var moveT = (ud.speed * dt) / trackLength;
    ud.trackT += moveT;
    ud.totalDist += ud.speed * dt;

    // Lap detection
    if (!ud.finished) {
        var prevT = t;
        var newT = ud.trackT % 1;
        if (newT < 0) newT += 1;
        // Crossed start line (t goes from ~1 back to ~0)
        if (prevT > 0.95 && newT < 0.05 && ud.speed > 5) {
            ud.lap++;
            if (ud.lap > totalLaps) {
                ud.finished = true;
                ud.finishTime = clock.elapsedTime;
                if (isPlayer) {
                    onRaceFinished();
                }
            } else if (isPlayer) {
                playSound(880, 0.1, 'sine', 0.15);
                playSound(1100, 0.15, 'sine', 0.1);
            }
        }
    }

    ud.trackT = ud.trackT % 1;
    if (ud.trackT < 0) ud.trackT += 1;

    // Collision cooldown
    if (ud.collisionCooldown > 0) ud.collisionCooldown -= dt;

    // Exhaust particles (always when moving)
    if (ud.speed > 2 && Math.random() < 0.3) {
        emitExhaust(car);
    }
}

function updatePlayerCar(dt) {
    var ud = playerCar.userData;
    if (ud.finished) { updateCar(playerCar, dt, true); return; }

    // Gas
    if (input.gas) {
        var accel = ud.acceleration;
        var maxSpd = ud.maxSpeed;
        if (ud.nosActive && ud.nos > 0) {
            accel *= NOS_BOOST;
            maxSpd *= 1.3;
            ud.nos -= NOS_DRAIN;
            if (ud.nos <= 0) { ud.nos = 0; ud.nosActive = false; }
            emitNosFlame(playerCar);
        }
        ud.speed = Math.min(ud.speed + accel * dt, maxSpd);
    } else {
        // Engine braking
        ud.speed *= (1 - 0.5 * dt);
    }

    // Brake
    if (input.brake) {
        ud.speed = Math.max(0, ud.speed - ud.brakeForce * dt);
        if (ud.speed > 5) emitTireSmoke(playerCar);
    }

    // NOS
    if (input.nos && ud.nos > 0 && input.gas) {
        if (!ud.nosActive) playNosSound();
        ud.nosActive = true;
    } else {
        ud.nosActive = false;
    }

    // NOS regen when not using
    if (!ud.nosActive && ud.nos < MAX_NOS) {
        ud.nos = Math.min(MAX_NOS, ud.nos + NOS_REGEN);
    }

    // Steering (lane change with smooth interpolation)
    if (input.left) {
        ud.targetLaneOffset -= 12 * dt;
        ud.targetLaneOffset = Math.max(ud.targetLaneOffset, -ROAD_WIDTH / 2 + 1.5);
    }
    if (input.right) {
        ud.targetLaneOffset += 12 * dt;
        ud.targetLaneOffset = Math.min(ud.targetLaneOffset, ROAD_WIDTH / 2 - 1.5);
    }

    ud.laneOffset += (ud.targetLaneOffset - ud.laneOffset) * 0.1;

    updateCar(playerCar, dt, true);
    updateEngineSound(ud.speed, ud.maxSpeed, ud.nosActive);
}

// ================================================================
//  AI
// ================================================================
function updateAI(car, dt) {
    var ud = car.userData;
    if (ud.finished) { updateCar(car, dt, false); return; }

    // AI drives with varying skill
    var targetSpeed = ud.maxSpeed * ud.aiSkill;

    // Accelerate toward target
    if (ud.speed < targetSpeed) {
        ud.speed += ud.acceleration * 0.7 * dt;
    } else {
        ud.speed *= (1 - 0.3 * dt);
    }

    // Lane changes to avoid obstacles (other cars)
    if (Math.random() < 0.01 * ud.aiAggression) {
        var newLane = Math.floor(Math.random() * NUM_LANES);
        ud.targetLaneOffset = (newLane - (NUM_LANES - 1) / 2) * LANE_W;
    }

    ud.laneOffset += (ud.targetLaneOffset - ud.laneOffset) * 0.05;

    // Occasional NOS burst
    if (Math.random() < 0.001 && ud.nos > 50) {
        ud.nosActive = true;
    }
    if (ud.nosActive) {
        ud.speed = Math.min(ud.speed * 1.01, ud.maxSpeed * 1.3);
        ud.nos -= NOS_DRAIN * 0.7;
        emitNosFlame(car);
        if (ud.nos <= 0) { ud.nos = 0; ud.nosActive = false; }
    }
    if (!ud.nosActive && ud.nos < MAX_NOS) ud.nos += NOS_REGEN * 0.5;

    // Exhaust
    if (ud.speed > 3 && Math.random() < 0.2) emitExhaust(car);

    updateCar(car, dt, false);
}

// ================================================================
//  COLLISION
// ================================================================
function checkCollisions(dt) {
    var allCars = [playerCar].concat(aiCars);

    for (var i = 0; i < allCars.length; i++) {
        for (var j = i + 1; j < allCars.length; j++) {
            var a = allCars[i], b = allCars[j];
            if (a.userData.collisionCooldown > 0 || b.userData.collisionCooldown > 0) continue;

            var dist = a.position.distanceTo(b.position);
            if (dist < 2.2) {
                // Impact!
                var pushForce = 8;
                var midX = (a.userData.laneOffset + b.userData.laneOffset) / 2;
                if (a.userData.laneOffset < midX) {
                    a.userData.targetLaneOffset -= pushForce * dt * 30;
                    b.userData.targetLaneOffset += pushForce * dt * 30;
                } else {
                    a.userData.targetLaneOffset += pushForce * dt * 30;
                    b.userData.targetLaneOffset -= pushForce * dt * 30;
                }

                // Clamp
                var hw = ROAD_WIDTH / 2 - 1;
                a.userData.targetLaneOffset = Math.max(-hw, Math.min(hw, a.userData.targetLaneOffset));
                b.userData.targetLaneOffset = Math.max(-hw, Math.min(hw, b.userData.targetLaneOffset));

                // Speed impact
                var avgSpeed = (a.userData.speed + b.userData.speed) / 2;
                a.userData.speed = avgSpeed * 0.85;
                b.userData.speed = avgSpeed * 0.85;

                a.userData.collisionCooldown = 0.5;
                b.userData.collisionCooldown = 0.5;

                // Effects
                var mid = a.position.clone().lerp(b.position, 0.5);
                emitSparks(mid.x, mid.y, mid.z);
                playCrashSound();
            }
        }

        // Wall collision
        var car = allCars[i];
        var maxOff = ROAD_WIDTH / 2 - 0.8;
        if (Math.abs(car.userData.laneOffset) > maxOff) {
            car.userData.laneOffset = Math.sign(car.userData.laneOffset) * maxOff;
            car.userData.targetLaneOffset = car.userData.laneOffset;
            car.userData.speed *= 0.9;
            if (car.userData.speed > 10) {
                emitSparks(car.position.x, 0.3, car.position.z);
                playSound(200, 0.1, 'sawtooth', 0.08);
            }
        }
    }
}

// ================================================================
//  CAMERA
// ================================================================
function updateCamera(dt) {
    if (!playerCar) return;
    var t = playerCar.userData.trackT;
    var pt = trackCurve.getPointAt(t);
    var tan = trackCurve.getTangentAt(t).normalize();
    var right = new THREE.Vector3(-tan.z, 0, tan.x);

    // Close behind car — tighter racing cam
    var camTarget = pt.clone().addScaledVector(right, playerCar.userData.laneOffset);
    var spdFactor = Math.min(playerCar.userData.speed / playerCar.userData.maxSpeed, 1);
    var camDist = -3.8 - spdFactor * 1.5; // pulls back slightly at high speed
    var camH = 1.8 + spdFactor * 0.6;
    var camPos = camTarget.clone()
        .addScaledVector(tan, camDist)
        .add(new THREE.Vector3(0, camH, 0));

    camera.position.lerp(camPos, 0.1);

    var lookAt = camTarget.clone().addScaledVector(tan, 6);
    lookAt.y = 0.6;
    camera.lookAt(lookAt);
}

// ================================================================
//  MINIMAP
// ================================================================
function drawMinimap() {
    var w = 80, h = 80;
    minimap.width = w * 2;
    minimap.height = h * 2;
    var mc = minimapCtx;
    mc.clearRect(0, 0, w * 2, h * 2);
    mc.scale(2, 2);

    // Track outline
    mc.strokeStyle = 'rgba(138,43,226,0.5)';
    mc.lineWidth = 2;
    mc.beginPath();
    for (var i = 0; i <= 100; i++) {
        var t = i / 100;
        var pt = trackCurve.getPointAt(t);
        var mx = (pt.x / 500 + 0.5) * w;
        var my = (pt.z / 500 + 0.5) * h;
        if (i === 0) mc.moveTo(mx, my);
        else mc.lineTo(mx, my);
    }
    mc.closePath();
    mc.stroke();

    // Player dot
    var pp = trackCurve.getPointAt(playerCar.userData.trackT);
    mc.fillStyle = '#39ff14';
    mc.beginPath();
    mc.arc((pp.x / 500 + 0.5) * w, (pp.z / 500 + 0.5) * h, 3, 0, Math.PI * 2);
    mc.fill();

    // AI dots
    for (var j = 0; j < aiCars.length; j++) {
        var ap = trackCurve.getPointAt(aiCars[j].userData.trackT);
        mc.fillStyle = '#' + AI_COLORS[j % AI_COLORS.length].toString(16).padStart(6, '0');
        mc.beginPath();
        mc.arc((ap.x / 500 + 0.5) * w, (ap.z / 500 + 0.5) * h, 2, 0, Math.PI * 2);
        mc.fill();
    }

    mc.setTransform(1, 0, 0, 1, 0, 0);
}

// ================================================================
//  RACE LOGIC
// ================================================================
function getPositions() {
    var all = [{ car: playerCar, name: 'YOU' }];
    for (var i = 0; i < aiCars.length; i++) {
        all.push({ car: aiCars[i], name: 'AI ' + (i + 1) });
    }
    all.sort(function(a, b) {
        // Finished cars first by finish time
        if (a.car.userData.finished && b.car.userData.finished)
            return a.car.userData.finishTime - b.car.userData.finishTime;
        if (a.car.userData.finished) return -1;
        if (b.car.userData.finished) return 1;
        // Then by lap, then by trackT
        var lapDiff = b.car.userData.lap - a.car.userData.lap;
        if (lapDiff !== 0) return lapDiff;
        return b.car.userData.trackT - a.car.userData.trackT;
    });
    return all;
}

function getPlayerPosition() {
    var pos = getPositions();
    for (var i = 0; i < pos.length; i++) {
        if (pos[i].name === 'YOU') return i + 1;
    }
    return pos.length;
}

function onRaceFinished() {
    state = 'finished';
    stopEngineSound();

    var pos = getPlayerPosition();
    var suffix = pos === 1 ? 'ST' : pos === 2 ? 'ND' : pos === 3 ? 'RD' : 'TH';

    resultBox.innerHTML = '<div class="pos">' + pos + suffix + '</div>' +
        '<div class="detail">RACE COMPLETE</div>' +
        '<div class="detail" style="margin-top:20px">' +
        '<div class="menu-btn" id="btn-restart">RACE AGAIN</div></div>';
    resultBox.style.display = 'block';
    menuMain.style.display = 'none';
    overlay.classList.remove('hidden');

    document.getElementById('btn-restart').addEventListener('click', function() {
        showMenu();
    });
    document.getElementById('btn-restart').addEventListener('touchstart', function(e) {
        e.preventDefault();
        showMenu();
    });

    hideHUD();
}

// ================================================================
//  INPUT SETUP
// ================================================================
function setupInput() {
    var btnIds = ['btn-left', 'btn-right', 'btn-gas', 'btn-brake', 'btn-nos'];
    var inputKeys = ['left', 'right', 'gas', 'brake', 'nos'];

    for (var i = 0; i < btnIds.length; i++) {
        (function(idx) {
            var el = document.getElementById(btnIds[idx]);
            el.addEventListener('touchstart', function(e) {
                e.preventDefault(); e.stopPropagation();
                input[inputKeys[idx]] = true;
                el.classList.add('active');
            }, { passive: false });
            el.addEventListener('touchend', function(e) {
                e.preventDefault(); e.stopPropagation();
                input[inputKeys[idx]] = false;
                el.classList.remove('active');
            }, { passive: false });
            el.addEventListener('touchcancel', function(e) {
                input[inputKeys[idx]] = false;
                el.classList.remove('active');
            });
            el.addEventListener('mousedown', function(e) {
                input[inputKeys[idx]] = true;
                el.classList.add('active');
            });
            el.addEventListener('mouseup', function(e) {
                input[inputKeys[idx]] = false;
                el.classList.remove('active');
            });
            el.addEventListener('mouseleave', function(e) {
                input[inputKeys[idx]] = false;
                el.classList.remove('active');
            });
        })(i);
    }

    // Keyboard
    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowLeft' || e.key === 'a') input.left = true;
        if (e.key === 'ArrowRight' || e.key === 'd') input.right = true;
        if (e.key === 'ArrowUp' || e.key === 'w') input.gas = true;
        if (e.key === 'ArrowDown' || e.key === 's') input.brake = true;
        if (e.key === 'Shift' || e.key === 'n') input.nos = true;
    });
    document.addEventListener('keyup', function(e) {
        if (e.key === 'ArrowLeft' || e.key === 'a') input.left = false;
        if (e.key === 'ArrowRight' || e.key === 'd') input.right = false;
        if (e.key === 'ArrowUp' || e.key === 'w') input.gas = false;
        if (e.key === 'ArrowDown' || e.key === 's') input.brake = false;
        if (e.key === 'Shift' || e.key === 'n') input.nos = false;
    });

    // Prevent scrolling
    document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
}

// ================================================================
//  MENU
// ================================================================
function showMenu() {
    state = 'menu';
    overlay.classList.remove('hidden');
    menuMain.style.display = 'block';
    resultBox.style.display = 'none';
    hideHUD();

    // Lap selection
    var lapSelect = document.getElementById('lap-select');
    lapSelect.innerHTML = '';
    var lapOptions = [1, 3, 5, 10];
    for (var i = 0; i < lapOptions.length; i++) {
        (function(laps) {
            var btn = document.createElement('div');
            btn.className = 'menu-btn' + (laps === selectedLaps ? ' selected' : '');
            btn.textContent = laps;
            btn.addEventListener('click', function() {
                selectedLaps = laps;
                var all = lapSelect.querySelectorAll('.menu-btn');
                for (var j = 0; j < all.length; j++) all[j].classList.remove('selected');
                btn.classList.add('selected');
            });
            btn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                selectedLaps = laps;
                var all = lapSelect.querySelectorAll('.menu-btn');
                for (var j = 0; j < all.length; j++) all[j].classList.remove('selected');
                btn.classList.add('selected');
            }, { passive: false });
            lapSelect.appendChild(btn);
        })(lapOptions[i]);
    }

    document.getElementById('btn-start').onclick = startRace;
    document.getElementById('btn-start').ontouchstart = function(e) { e.preventDefault(); startRace(); };
}

function startRace() {
    initAudio();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

    totalLaps = selectedLaps;

    // Clean up old cars
    if (playerCar) scene.remove(playerCar);
    for (var i = 0; i < aiCars.length; i++) scene.remove(aiCars[i]);

    spawnCars();
    overlay.classList.add('hidden');
    showHUD();

    // Countdown
    state = 'countdown';
    countdownTimer = 0;
    countdownNum = 3;

    startEngineSound();
}

// ================================================================
//  COUNTDOWN
// ================================================================
var countdownEl = null;

function showCountdown(num) {
    if (countdownEl) document.body.removeChild(countdownEl);
    countdownEl = document.createElement('div');
    countdownEl.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:80px;font-weight:bold;color:#39ff14;text-shadow:0 0 30px #39ff14;z-index:25;pointer-events:none;font-family:monospace;transition:all 0.3s';
    countdownEl.textContent = num === 0 ? 'GO!' : num;
    document.body.appendChild(countdownEl);
    if (num === 0) {
        countdownEl.style.color = '#ffcc00';
        countdownEl.style.textShadow = '0 0 30px #ffcc00';
    }
}

function hideCountdown() {
    if (countdownEl) {
        document.body.removeChild(countdownEl);
        countdownEl = null;
    }
}

// ================================================================
//  MAIN GAME LOOP
// ================================================================
function gameLoop() {
    requestAnimationFrame(gameLoop);

    var dt = Math.min(clock.getDelta(), 0.05);

    if (state === 'countdown') {
        countdownTimer += dt;
        var num = 3 - Math.floor(countdownTimer);
        if (num !== countdownNum) {
            countdownNum = num;
            if (num >= 0) {
                showCountdown(num);
                playSound(num === 0 ? 880 : 440, 0.2, 'sine', 0.15);
            }
        }
        if (countdownTimer >= 4) {
            hideCountdown();
            state = 'racing';
        }
        updateCamera(dt);
    }

    // Always update day/night and clouds
    updateDayNight(dt);
    updateClouds(dt);

    if (state === 'racing' || state === 'finished') {
        // Update player
        updatePlayerCar(dt);

        // Update AI
        for (var i = 0; i < aiCars.length; i++) {
            updateAI(aiCars[i], dt);
        }

        // Collisions
        checkCollisions(dt);

        // Particles
        updateParticles(dt);

        // Camera
        updateCamera(dt);

        // HUD
        updateHUD();

        // Check if all AI finished
        if (state === 'racing' && playerCar.userData.finished) {
            // Already handled in onRaceFinished
        }
    }

    // Always render
    renderer.render(scene, camera);
}

// ================================================================
//  INIT
// ================================================================
function init() {
    initThree();
    generateTrack();
    initParticlePool();
    setupInput();
    showMenu();
    gameLoop();
}

// Start when Three.js is loaded
if (typeof THREE !== 'undefined') {
    init();
} else {
    // Wait for script to load
    var checkThree = setInterval(function() {
        if (typeof THREE !== 'undefined') {
            clearInterval(checkThree);
            init();
        }
    }, 100);
}

})();
</script>
</body>
</html>
