var particleMeshes = { exhaust: [], tire: [], spark: [], nosFlame: [] };

function initParticlePool() {
    // Exhaust smoke
    var smokeGeo = new THREE.SphereGeometry(0.06, 4, 4);
    for (var i = 0; i < 30; i++) {
        var mat = new THREE.MeshBasicMaterial({ color: 0x888888, transparent: true, opacity: 0 });
        var m = new THREE.Mesh(smokeGeo, mat);
        m.visible = false;
        scene.add(m);
        particleMeshes.exhaust.push({ mesh: m, life: 0, maxLife: 0, vx: 0, vy: 0, vz: 0 });
    }

    // Tire smoke
    var tireGeo = new THREE.SphereGeometry(0.08, 4, 4);
    for (var j = 0; j < 40; j++) {
        var tMat = new THREE.MeshBasicMaterial({ color: 0xaaaaaa, transparent: true, opacity: 0 });
        var tM = new THREE.Mesh(tireGeo, tMat);
        tM.visible = false;
        scene.add(tM);
        particleMeshes.tire.push({ mesh: tM, life: 0, maxLife: 0, vx: 0, vy: 0, vz: 0 });
    }

    // Sparks
    var sparkGeo = new THREE.BoxGeometry(0.03, 0.03, 0.12);
    for (var k = 0; k < 25; k++) {
        var sMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0 });
        var sM = new THREE.Mesh(sparkGeo, sMat);
        sM.visible = false;
        scene.add(sM);
        particleMeshes.spark.push({ mesh: sM, life: 0, maxLife: 0, vx: 0, vy: 0, vz: 0 });
    }

    // NOS flame
    var flameGeo = new THREE.ConeGeometry(0.08, 0.3, 6);
    for (var n = 0; n < 20; n++) {
        var nMat = new THREE.MeshBasicMaterial({ color: 0x00aaff, transparent: true, opacity: 0 });
        var nM = new THREE.Mesh(flameGeo, nMat);
        nM.visible = false;
        scene.add(nM);
        particleMeshes.nosFlame.push({ mesh: nM, life: 0, maxLife: 0, vx: 0, vy: 0, vz: 0 });
    }
}

function spawnParticle(type, x, y, z, vx, vy, vz, life, color) {
    var pool = particleMeshes[type];
    if (!pool) return;
    for (var i = 0; i < pool.length; i++) {
        if (pool[i].life <= 0) {
            var p = pool[i];
            p.mesh.position.set(x, y, z);
            p.mesh.visible = true;
            p.mesh.material.opacity = 1;
            if (color !== undefined) p.mesh.material.color.setHex(color);
            p.life = life;
            p.maxLife = life;
            p.vx = vx; p.vy = vy; p.vz = vz;
            return;
        }
    }
}

function updateParticles(dt) {
    var types = ['exhaust', 'tire', 'spark', 'nosFlame'];
    for (var t = 0; t < types.length; t++) {
        var pool = particleMeshes[types[t]];
        for (var i = 0; i < pool.length; i++) {
            var p = pool[i];
            if (p.life > 0) {
                p.life -= dt;
                var frac = Math.max(0, p.life / p.maxLife);
                p.mesh.material.opacity = frac;
                p.mesh.position.x += p.vx * dt;
                p.mesh.position.y += p.vy * dt;
                p.mesh.position.z += p.vz * dt;
                if (types[t] === 'exhaust' || types[t] === 'tire') {
                    p.mesh.scale.setScalar(1 + (1 - frac) * 2);
                    p.vy += dt * 0.5;
                }
                if (types[t] === 'spark') {
                    p.vy -= dt * 15;
                }
                if (p.life <= 0) {
                    p.mesh.visible = false;
                }
            }
        }
    }
}

function emitExhaust(car) {
    var pos = car.position.clone();
    var dir = new THREE.Vector3(0, 0, -1).applyQuaternion(car.quaternion);
    var ePos = pos.clone().addScaledVector(dir, 1.3);
    ePos.y += 0.2;
    for (var i = -1; i <= 1; i += 2) {
        var right = new THREE.Vector3(-dir.z, 0, dir.x);
        var ep = ePos.clone().addScaledVector(right, i * 0.2);
        spawnParticle('exhaust', ep.x, ep.y, ep.z,
            dir.x * -2 + (Math.random() - 0.5),
            0.5 + Math.random(),
            dir.z * -2 + (Math.random() - 0.5),
            0.5 + Math.random() * 0.5, 0x555555);
    }
}

function emitTireSmoke(car) {
    var pos = car.position.clone();
    var dir = new THREE.Vector3(0, 0, -1).applyQuaternion(car.quaternion);
    var right = new THREE.Vector3(-dir.z, 0, dir.x);
    // Rear wheels
    for (var i = -1; i <= 1; i += 2) {
        var wp = pos.clone().addScaledVector(dir, 0.8).addScaledVector(right, i * 0.5);
        wp.y = 0.1;
        spawnParticle('tire', wp.x, wp.y, wp.z,
            (Math.random() - 0.5) * 2, 0.3 + Math.random(), (Math.random() - 0.5) * 2,
            0.6 + Math.random() * 0.4, 0xcccccc);
    }
}

function emitSparks(x, y, z) {
    for (var i = 0; i < 8; i++) {
        spawnParticle('spark', x, y + 0.3, z,
            (Math.random() - 0.5) * 10, 3 + Math.random() * 5, (Math.random() - 0.5) * 10,
            0.3 + Math.random() * 0.3, 0xffaa00);
    }
}

function emitNosFlame(car) {
    var pos = car.position.clone();
    var dir = new THREE.Vector3(0, 0, -1).applyQuaternion(car.quaternion);
    var ePos = pos.clone().addScaledVector(dir, 1.4);
    ePos.y += 0.2;
    for (var i = -1; i <= 1; i += 2) {
        var right = new THREE.Vector3(-dir.z, 0, dir.x);
        var ep = ePos.clone().addScaledVector(right, i * 0.2);
        spawnParticle('nosFlame', ep.x, ep.y, ep.z,
            dir.x * -6 + (Math.random() - 0.5) * 2,
            (Math.random() - 0.5) * 2,
            dir.z * -6 + (Math.random() - 0.5) * 2,
            0.2 + Math.random() * 0.2,
            Math.random() < 0.5 ? 0x00aaff : 0x0066ff);
    }
}

// ================================================================
//  CAR PHYSICS & UPDATE
// ================================================================
function updateCar(car, dt, isPlayer) {
    var ud = car.userData;
    if (ud.finished) {
        ud.speed *= 0.98;
        if (ud.speed < 1) ud.speed = 0;
    }

    // Get position on track
    var t = ud.trackT;
    if (t < 0) t += 1;
    if (t >= 1) t -= 1;
    ud.trackT = t;

    var pt = trackCurve.getPointAt(t);
    var tan = trackCurve.getTangentAt(t).normalize();
    var right = new THREE.Vector3(-tan.z, 0, tan.x);

    // Position
    var targetPos = pt.clone().addScaledVector(right, ud.laneOffset);
    targetPos.y = Math.max(0, car.position.y);

    car.position.copy(targetPos);

    // Rotation to face direction
    var lookTarget = pt.clone().add(tan.clone().multiplyScalar(5));
    lookTarget.addScaledVector(right, ud.laneOffset);
    lookTarget.y = car.position.y;
    car.lookAt(lookTarget);

    // Car physics: body roll (lean into turns) + pitch on accel/brake
    // Stronger roll based on both lane change and track curvature
    var steerDelta = ud.targetLaneOffset - ud.laneOffset;

    // Track curvature: compare tangent at t vs t+small offset
    var curveSample = Math.min(t + 0.005, 0.999);
    var tanAhead = trackCurve.getTangentAt(curveSample).normalize();
    var trackCurveAmount = tan.x * tanAhead.z - tan.z * tanAhead.x; // cross product y

    var spdRatio = Math.min(ud.speed / 20, 1);
    var targetRoll = (-steerDelta * 0.06 - trackCurveAmount * 2.5) * spdRatio;
    targetRoll = Math.max(-0.18, Math.min(0.18, targetRoll));
    if (!ud.bodyRoll) ud.bodyRoll = 0;
    ud.bodyRoll += (targetRoll - ud.bodyRoll) * 0.12;

    var targetPitch = 0;
    if (isPlayer) {
        if (input.brake && ud.speed > 3) targetPitch = 0.04;
        else if (input.gas || ud.nosActive) targetPitch = -0.02;
    }
    if (!ud.bodyPitch) ud.bodyPitch = 0;
    ud.bodyPitch += (targetPitch - ud.bodyPitch) * 0.08;

    // Apply roll and pitch via quaternion (preserves lookAt heading)
    if (Math.abs(ud.bodyRoll) > 0.001 || Math.abs(ud.bodyPitch) > 0.001) {
        var tiltQ = new THREE.Quaternion();
        var tiltE = new THREE.Euler(ud.bodyPitch, 0, ud.bodyRoll, 'XYZ');
        tiltQ.setFromEuler(tiltE);
        car.quaternion.multiply(tiltQ);
    }

    // Wheel spin — visible rotation on the rolling axis
    if (ud.wheels) {
        // Wheels are oriented with Z = Math.PI/2 so rolling axis is local Y
        if (!ud.wheelAngle) ud.wheelAngle = 0;
        ud.wheelAngle += ud.speed * dt * 5;
        for (var w = 0; w < ud.wheels.length; w++) {
            // Apply spin via child meshes (tire is first child)
            var wg = ud.wheels[w];
            // Spin entire wheel group on Y (visible rotation)
            wg.children[0].rotation.x = ud.wheelAngle; // tire
        }
        // Front wheel steering turn (first 2 wheels)
        var frontSteer = (steerDelta * 0.02) * spdRatio;
        frontSteer = Math.max(-0.25, Math.min(0.25, frontSteer));
        if (ud.wheels.length >= 2) {
            ud.wheels[0].rotation.y = frontSteer;
            ud.wheels[1].rotation.y = frontSteer;
        }
    }

    // Brake lights
    if (ud.tailLights) {
        var braking = isPlayer ? input.brake : false;
        for (var tl = 0; tl < ud.tailLights.length; tl++) {
            ud.tailLights[tl].material.color.setHex(braking ? 0xff0000 : 0xff0022);
            ud.tailLights[tl].scale.setScalar(braking ? 1.5 : 1);
        }
    }

    // Move along track
    var moveT = (ud.speed * dt) / trackLength;
    ud.trackT += moveT;
    ud.totalDist += ud.speed * dt;

    // Lap detection
    if (!ud.finished) {
        var prevT = t;
        var newT = ud.trackT % 1;
        if (newT < 0) newT += 1;
        // Crossed start line (t goes from ~1 back to ~0)
        if (prevT > 0.95 && newT < 0.05 && ud.speed > 5) {
            ud.lap++;
            if (ud.lap > totalLaps) {
                ud.finished = true;
                ud.finishTime = clock.elapsedTime;
                if (isPlayer) {
                    onRaceFinished();
                }
            } else if (isPlayer) {
                playSound(880, 0.1, 'sine', 0.15);
                playSound(1100, 0.15, 'sine', 0.1);
            }
        }
    }

    ud.trackT = ud.trackT % 1;
    if (ud.trackT < 0) ud.trackT += 1;

    // Collision cooldown
    if (ud.collisionCooldown > 0) ud.collisionCooldown -= dt;

    // Exhaust particles (always when moving)
    if (ud.speed > 2 && Math.random() < 0.3) {
        emitExhaust(car);
    }

    // Tire physics: smoke on hard turns
    if (ud.speed > 8 && Math.abs(steerDelta) > 0.5) {
        if (Math.random() < 0.4) emitTireSmoke(car);
    }
    // Tire screech on very hard turns at speed
    if (isPlayer && ud.speed > 15 && Math.abs(steerDelta) > 1.0) {
        if (Math.random() < 0.05) playSound(300 + Math.random() * 200, 0.1, 'sawtooth', 0.03);
    }
}

function updatePlayerCar(dt) {
    var ud = playerCar.userData;
    if (ud.finished) { updateCar(playerCar, dt, true); return; }

    // NOS check first (NOS implies acceleration even without gas held)
    if (input.nos && ud.nos > 0) {
        if (!ud.nosActive) playNosSound();
        ud.nosActive = true;
    } else {
        ud.nosActive = false;
    }

    // Gas OR NOS = accelerate
    if (input.gas || ud.nosActive) {
        var accel = ud.acceleration;
        var maxSpd = ud.maxSpeed;
        if (ud.nosActive && ud.nos > 0) {
            accel *= NOS_BOOST;
            maxSpd *= 1.3;
            ud.nos -= NOS_DRAIN;
            if (ud.nos <= 0) { ud.nos = 0; ud.nosActive = false; }
            emitNosFlame(playerCar);
        }
        ud.speed = Math.min(ud.speed + accel * dt, maxSpd);
    } else {
        // Engine braking
        ud.speed *= (1 - 0.5 * dt);
    }

    // Brake
    if (input.brake) {
        ud.speed = Math.max(0, ud.speed - ud.brakeForce * dt);
        if (ud.speed > 5) emitTireSmoke(playerCar);
    }

    // NOS already handled above
    if (false) {
    }

    // NOS regen when not using
    if (!ud.nosActive && ud.nos < MAX_NOS) {
        ud.nos = Math.min(MAX_NOS, ud.nos + NOS_REGEN);
    }

    // Steering — analog joystick or keyboard
    var steerAmount = 0;
    if (Math.abs(joystickX) > 0.1) {
        steerAmount = joystickX; // -1 to 1 analog
    } else if (input.left) {
        steerAmount = -1;
    } else if (input.right) {
        steerAmount = 1;
    }
    var steerSpeed = 14 * Math.abs(steerAmount);
    ud.targetLaneOffset += steerAmount * steerSpeed * dt;
    ud.targetLaneOffset = Math.max(-ROAD_WIDTH / 2 + 1.5, Math.min(ROAD_WIDTH / 2 - 1.5, ud.targetLaneOffset));

    ud.laneOffset += (ud.targetLaneOffset - ud.laneOffset) * 0.12;

    updateCar(playerCar, dt, true);
    updateEngineSound(ud.speed, ud.maxSpeed, ud.nosActive);
}

// ================================================================
//  AI
// ================================================================
function updateAI(car, dt) {
    var ud = car.userData;
    if (ud.finished) { updateCar(car, dt, false); return; }

    // AI drives with varying skill
    var targetSpeed = ud.maxSpeed * ud.aiSkill;

    // Accelerate toward target
    if (ud.speed < targetSpeed) {
        ud.speed += ud.acceleration * 0.7 * dt;
    } else {
        ud.speed *= (1 - 0.3 * dt);
    }

    // Lane changes to avoid obstacles (other cars)
    if (Math.random() < 0.01 * ud.aiAggression) {
        var newLane = Math.floor(Math.random() * NUM_LANES);
        ud.targetLaneOffset = (newLane - (NUM_LANES - 1) / 2) * LANE_W;
    }

    ud.laneOffset += (ud.targetLaneOffset - ud.laneOffset) * 0.05;

    // Occasional NOS burst
    if (Math.random() < 0.001 && ud.nos > 50) {
        ud.nosActive = true;
    }
    if (ud.nosActive) {
        ud.speed = Math.min(ud.speed * 1.01, ud.maxSpeed * 1.3);
        ud.nos -= NOS_DRAIN * 0.7;
        emitNosFlame(car);
        if (ud.nos <= 0) { ud.nos = 0; ud.nosActive = false; }
    }
    if (!ud.nosActive && ud.nos < MAX_NOS) ud.nos += NOS_REGEN * 0.5;

    // Exhaust
    if (ud.speed > 3 && Math.random() < 0.2) emitExhaust(car);

    // AI tire smoke on lane changes
    var aiSteerDelta = ud.targetLaneOffset - ud.laneOffset;
    if (ud.speed > 12 && Math.abs(aiSteerDelta) > 0.8 && Math.random() < 0.3) {
        emitTireSmoke(car);
    }

    updateCar(car, dt, false);
}

// ================================================================
//  COLLISION
// ================================================================
function checkCollisions(dt) {
    var allCars = [playerCar].concat(aiCars);

    for (var i = 0; i < allCars.length; i++) {
        for (var j = i + 1; j < allCars.length; j++) {
            var a = allCars[i], b = allCars[j];
            if (a.userData.collisionCooldown > 0 || b.userData.collisionCooldown > 0) continue;

            var dist = a.position.distanceTo(b.position);
            if (dist < 2.2) {
                // Impact!
                var pushForce = 8;
                var midX = (a.userData.laneOffset + b.userData.laneOffset) / 2;
                if (a.userData.laneOffset < midX) {
                    a.userData.targetLaneOffset -= pushForce * dt * 30;
                    b.userData.targetLaneOffset += pushForce * dt * 30;
                } else {
                    a.userData.targetLaneOffset += pushForce * dt * 30;
                    b.userData.targetLaneOffset -= pushForce * dt * 30;
                }

                // Clamp
                var hw = ROAD_WIDTH / 2 - 1;
                a.userData.targetLaneOffset = Math.max(-hw, Math.min(hw, a.userData.targetLaneOffset));
                b.userData.targetLaneOffset = Math.max(-hw, Math.min(hw, b.userData.targetLaneOffset));

                // Speed impact
                var avgSpeed = (a.userData.speed + b.userData.speed) / 2;
                a.userData.speed = avgSpeed * 0.85;
                b.userData.speed = avgSpeed * 0.85;

                a.userData.collisionCooldown = 0.5;
                b.userData.collisionCooldown = 0.5;

                // Effects
                var mid = a.position.clone().lerp(b.position, 0.5);
                emitSparks(mid.x, mid.y, mid.z);
                playCrashSound();
            }
        }

        // Wall collision
        var car = allCars[i];
        var maxOff = ROAD_WIDTH / 2 - 0.8;
        if (Math.abs(car.userData.laneOffset) > maxOff) {
            car.userData.laneOffset = Math.sign(car.userData.laneOffset) * maxOff;
            car.userData.targetLaneOffset = car.userData.laneOffset;
            car.userData.speed *= 0.9;
            if (car.userData.speed > 10) {
                emitSparks(car.position.x, 0.3, car.position.z);
                playSound(200, 0.1, 'sawtooth', 0.08);
            }
        }
    }
}

// ================================================================
//  CAMERA
// ================================================================
function updateCamera(dt) {
    if (!playerCar) return;
    var t = playerCar.userData.trackT;
    var pt = trackCurve.getPointAt(t);
    var tan = trackCurve.getTangentAt(t).normalize();
    var right = new THREE.Vector3(-tan.z, 0, tan.x);

    // Close behind car — minimal zoom change on speed
    var camTarget = pt.clone().addScaledVector(right, playerCar.userData.laneOffset);
    var spdFactor = Math.min(playerCar.userData.speed / playerCar.userData.maxSpeed, 1);
    var camDist = -4.0 - spdFactor * 0.4; // barely pulls back at speed
    var camH = 1.9 + spdFactor * 0.15;
    var camPos = camTarget.clone()
        .addScaledVector(tan, camDist)
        .add(new THREE.Vector3(0, camH, 0));

    camera.position.lerp(camPos, 0.1);

    var lookAt = camTarget.clone().addScaledVector(tan, 6);
    lookAt.y = 0.6;
    camera.lookAt(lookAt);
}

// ================================================================
//  MINIMAP
// ================================================================
function drawMinimap() {
    var w = 80, h = 80;
    minimap.width = w * 2;
    minimap.height = h * 2;
    var mc = minimapCtx;
    mc.clearRect(0, 0, w * 2, h * 2);
    mc.scale(2, 2);

    // Track outline
    mc.strokeStyle = 'rgba(138,43,226,0.5)';
    mc.lineWidth = 2;
    mc.beginPath();
    for (var i = 0; i <= 50; i++) {
        var t = i / 50;
        var pt = trackCurve.getPointAt(t);
        var mx = (pt.x / 500 + 0.5) * w;
        var my = (pt.z / 500 + 0.5) * h;
        if (i === 0) mc.moveTo(mx, my);
        else mc.lineTo(mx, my);
    }
    mc.closePath();
    mc.stroke();

    // Player dot
    var pp = trackCurve.getPointAt(playerCar.userData.trackT);
    mc.fillStyle = '#39ff14';
    mc.beginPath();
    mc.arc((pp.x / 500 + 0.5) * w, (pp.z / 500 + 0.5) * h, 3, 0, Math.PI * 2);
    mc.fill();

    // AI dots
    for (var j = 0; j < aiCars.length; j++) {
        var ap = trackCurve.getPointAt(aiCars[j].userData.trackT);
        mc.fillStyle = '#' + AI_COLORS[j % AI_COLORS.length].toString(16).padStart(6, '0');
        mc.beginPath();
        mc.arc((ap.x / 500 + 0.5) * w, (ap.z / 500 + 0.5) * h, 2, 0, Math.PI * 2);
        mc.fill();
    }

    mc.setTransform(1, 0, 0, 1, 0, 0);
}

// ================================================================
//  RACE LOGIC
// ================================================================
function getPositions() {
    var all = [{ car: playerCar, name: 'YOU' }];
    for (var i = 0; i < aiCars.length; i++) {
        all.push({ car: aiCars[i], name: 'AI ' + (i + 1) });
    }
    all.sort(function(a, b) {
        // Finished cars first by finish time
        if (a.car.userData.finished && b.car.userData.finished)
            return a.car.userData.finishTime - b.car.userData.finishTime;
        if (a.car.userData.finished) return -1;
        if (b.car.userData.finished) return 1;
        // Then by lap, then by trackT
        var lapDiff = b.car.userData.lap - a.car.userData.lap;
        if (lapDiff !== 0) return lapDiff;
        return b.car.userData.trackT - a.car.userData.trackT;
    });
    return all;
}

function getPlayerPosition() {
    var pos = getPositions();
    for (var i = 0; i < pos.length; i++) {
        if (pos[i].name === 'YOU') return i + 1;
    }
    return pos.length;
}

function onRaceFinished() {
    state = 'finished';
    stopEngineSound();

    var pos = getPlayerPosition();
    var suffix = pos === 1 ? 'ST' : pos === 2 ? 'ND' : pos === 3 ? 'RD' : 'TH';

    resultBox.innerHTML = '<div class="pos">' + pos + suffix + '</div>' +
        '<div class="detail">RACE COMPLETE</div>' +
        '<div class="detail" style="margin-top:20px">' +
        '<div class="menu-btn" id="btn-restart">RACE AGAIN</div></div>';
    resultBox.style.display = 'block';
    menuMain.style.display = 'none';
    overlay.classList.remove('hidden');

    document.getElementById('btn-restart').addEventListener('click', function() {
        showMenu();
    });
    document.getElementById('btn-restart').addEventListener('touchstart', function(e) {
        e.preventDefault();
        showMenu();
    });

    hideHUD();
}

// ================================================================
//  INPUT SETUP
// ================================================================
// Joystick state
var joystickX = 0; // -1 to 1

function setupJoystick() {
    var zone = document.getElementById('joystick-zone');
    var thumb = document.getElementById('joystick-thumb');
    var base = document.getElementById('joystick-base');
    var activeId = null;
    var baseRect = null;
    var centerX = 65, centerY = 65, maxDist = 37;

    function updateThumb(cx) {
        var dx = cx - centerX;
        var clamped = Math.max(-maxDist, Math.min(maxDist, dx));
        thumb.style.left = (centerX - 28 + clamped) + 'px';
        joystickX = clamped / maxDist;
        input.left = joystickX < -0.2;
        input.right = joystickX > 0.2;
    }

    function resetThumb() {
        thumb.style.left = '37px';
        joystickX = 0;
        input.left = false;
        input.right = false;
    }

    zone.addEventListener('touchstart', function(e) {
        e.preventDefault(); e.stopPropagation();
        var t = e.changedTouches[0];
        activeId = t.identifier;
        baseRect = base.getBoundingClientRect();
        var cx = t.clientX - baseRect.left;
        updateThumb(cx);
    }, { passive: false });

    zone.addEventListener('touchmove', function(e) {
        e.preventDefault(); e.stopPropagation();
        for (var i = 0; i < e.changedTouches.length; i++) {
            if (e.changedTouches[i].identifier === activeId && baseRect) {
                var cx = e.changedTouches[i].clientX - baseRect.left;
                updateThumb(cx);
            }
        }
    }, { passive: false });

    zone.addEventListener('touchend', function(e) {
        for (var i = 0; i < e.changedTouches.length; i++) {
            if (e.changedTouches[i].identifier === activeId) {
                activeId = null;
                resetThumb();
            }
        }
    });
    zone.addEventListener('touchcancel', function() { activeId = null; resetThumb(); });

    // Mouse fallback
    var mouseDown = false;
    zone.addEventListener('mousedown', function(e) {
        mouseDown = true;
        baseRect = base.getBoundingClientRect();
        updateThumb(e.clientX - baseRect.left);
    });
    window.addEventListener('mousemove', function(e) {
        if (mouseDown && baseRect) updateThumb(e.clientX - baseRect.left);
    });
    window.addEventListener('mouseup', function() { if (mouseDown) { mouseDown = false; resetThumb(); } });
}

function setupInput() {
    setupJoystick();

    var btnIds = ['btn-gas', 'btn-brake', 'btn-nos'];
    var inputKeys = ['gas', 'brake', 'nos'];

    for (var i = 0; i < btnIds.length; i++) {
        (function(idx) {
            var el = document.getElementById(btnIds[idx]);
            el.addEventListener('touchstart', function(e) {
                e.preventDefault(); e.stopPropagation();
                input[inputKeys[idx]] = true;
                el.classList.add('active');
            }, { passive: false });
            el.addEventListener('touchend', function(e) {
                e.preventDefault(); e.stopPropagation();
                input[inputKeys[idx]] = false;
                el.classList.remove('active');
            }, { passive: false });
            el.addEventListener('touchcancel', function(e) {
                input[inputKeys[idx]] = false;
                el.classList.remove('active');
            });
            el.addEventListener('mousedown', function(e) {
                input[inputKeys[idx]] = true;
                el.classList.add('active');
            });
            el.addEventListener('mouseup', function(e) {
                input[inputKeys[idx]] = false;
                el.classList.remove('active');
            });
            el.addEventListener('mouseleave', function(e) {
                input[inputKeys[idx]] = false;
                el.classList.remove('active');
            });
        })(i);
    }

    // Keyboard
    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowLeft' || e.key === 'a') input.left = true;
        if (e.key === 'ArrowRight' || e.key === 'd') input.right = true;
        if (e.key === 'ArrowUp' || e.key === 'w') input.gas = true;
        if (e.key === 'ArrowDown' || e.key === 's') input.brake = true;
        if (e.key === 'Shift' || e.key === 'n') input.nos = true;
    });
    document.addEventListener('keyup', function(e) {
        if (e.key === 'ArrowLeft' || e.key === 'a') input.left = false;
        if (e.key === 'ArrowRight' || e.key === 'd') input.right = false;
        if (e.key === 'ArrowUp' || e.key === 'w') input.gas = false;
        if (e.key === 'ArrowDown' || e.key === 's') input.brake = false;
        if (e.key === 'Shift' || e.key === 'n') input.nos = false;
    });

    // Prevent scrolling
    document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
}

function showMenu() {
    state = 'menu';
    overlay.classList.remove('hidden');
    menuMain.style.display = 'block';
    resultBox.style.display = 'none';
    hideHUD();

    // Lap selection
    var lapSelect = document.getElementById('lap-select');
    lapSelect.innerHTML = '';
    var lapOptions = [1, 3, 5, 10];
    for (var i = 0; i < lapOptions.length; i++) {
        (function(laps) {
            var btn = document.createElement('div');
            btn.className = 'menu-btn' + (laps === selectedLaps ? ' selected' : '');
            btn.textContent = laps;
            btn.addEventListener('click', function() {
                selectedLaps = laps;
                var all = lapSelect.querySelectorAll('.menu-btn');
                for (var j = 0; j < all.length; j++) all[j].classList.remove('selected');
                btn.classList.add('selected');
            });
            btn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                selectedLaps = laps;
                var all = lapSelect.querySelectorAll('.menu-btn');
                for (var j = 0; j < all.length; j++) all[j].classList.remove('selected');
                btn.classList.add('selected');
            }, { passive: false });
            lapSelect.appendChild(btn);
        })(lapOptions[i]);
    }

    document.getElementById('btn-start').onclick = startRace;
    document.getElementById('btn-start').ontouchstart = function(e) { e.preventDefault(); startRace(); };
}

function startRace() {
    initAudio();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

    totalLaps = selectedLaps;

    // Clean up old cars
    if (playerCar) scene.remove(playerCar);
    for (var i = 0; i < aiCars.length; i++) scene.remove(aiCars[i]);

    spawnCars();
    overlay.classList.add('hidden');
    showHUD();

    // Countdown
    state = 'countdown';
    countdownTimer = 0;
    countdownNum = 3;

    startEngineSound();
}

// ================================================================
//  COUNTDOWN
// ================================================================
var countdownEl = null;

function showCountdown(num) {
    if (countdownEl) document.body.removeChild(countdownEl);
    countdownEl = document.createElement('div');
    countdownEl.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:80px;font-weight:bold;color:#39ff14;text-shadow:0 0 30px #39ff14;z-index:25;pointer-events:none;font-family:monospace;transition:all 0.3s';
    countdownEl.textContent = num === 0 ? 'GO!' : num;
    document.body.appendChild(countdownEl);
    if (num === 0) {
        countdownEl.style.color = '#ffcc00';
        countdownEl.style.textShadow = '0 0 30px #ffcc00';
    }
}

function hideCountdown() {
    if (countdownEl) {
        document.body.removeChild(countdownEl);
        countdownEl = null;
    }
}

// ================================================================
//  MAIN GAME LOOP
// ================================================================
function gameLoop() {
    requestAnimationFrame(gameLoop);

    var dt = Math.min(clock.getDelta(), 0.05);

    if (state === 'countdown') {
        countdownTimer += dt;
        var num = 3 - Math.floor(countdownTimer);
        if (num !== countdownNum) {
            countdownNum = num;
            if (num >= 0) {
                showCountdown(num);
                playSound(num === 0 ? 880 : 440, 0.2, 'sine', 0.15);
            }
        }
        if (countdownTimer >= 4) {
            hideCountdown();
            state = 'racing';
        }
        updateCamera(dt);
    }

    // Always update day/night and clouds
    updateDayNight(dt);
    updateClouds(dt);

    if (state === 'racing' || state === 'finished') {
        // Update player
        updatePlayerCar(dt);

        // Update AI
        for (var i = 0; i < aiCars.length; i++) {
            updateAI(aiCars[i], dt);
        }

        // Collisions
        checkCollisions(dt);

        // Particles
        updateParticles(dt);

        // Camera
        updateCamera(dt);

        // HUD
        updateHUD();

        // Check if all AI finished
        if (state === 'racing' && playerCar.userData.finished) {
            // Already handled in onRaceFinished
        }
    }

    // Always render
    renderer.render(scene, camera);
}

// ================================================================
//  INIT
// ================================================================
function init() {
    initThree();
    generateTrack();
    initParticlePool();
    setupInput();
    showMenu();
    gameLoop();
}

// Start when Three.js is loaded
if (typeof THREE !== 'undefined') {
    init();
} else {
    // Wait for script to load
    var checkThree = setInterval(function() {
        if (typeof THREE !== 'undefined') {
            clearInterval(checkThree);
            init();
        }
    }, 100);
}

})();
</script>
</body>
</html>
